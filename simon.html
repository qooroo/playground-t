<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎨 Theo Says — Theo's Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@500;700&display=swap');

  :root {
    --pink:#ff2bd6; --cyan:#00f0ff; --yellow:#ffe600; --lime:#7cff00;
    --orange:#ff8a00; --ink:#11002b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:'Fredoka', system-ui, sans-serif; color:#fff;
    background:
      radial-gradient(circle at 25% 15%, rgba(0,240,255,.30), transparent 45%),
      radial-gradient(circle at 80% 25%, rgba(255,43,214,.30), transparent 45%),
      linear-gradient(135deg,#2d0052,#1a0033 60%,#11002b);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; overflow:hidden; touch-action:manipulation;
    user-select:none; -webkit-user-select:none;
  }

  .topbar {
    width:100%; max-width:520px; display:flex; align-items:center;
    justify-content:space-between; padding:.7rem 1rem .3rem; gap:.5rem;
  }
  .topbar a { color:var(--cyan); text-decoration:none; font-weight:700; font-size:.95rem; text-shadow:0 0 8px var(--cyan); }
  .topbar a:hover { color:var(--yellow); text-shadow:0 0 8px var(--yellow); }
  h1 {
    font-family:'Bungee', sans-serif; font-size:clamp(1.3rem,5vw,2rem);
    background:linear-gradient(90deg,var(--lime),var(--cyan),var(--pink));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 10px rgba(0,240,255,.6)); white-space:nowrap;
  }
  .mute { background:none; border:none; cursor:pointer; font-size:1.4rem; }
  .mute.off { opacity:.45; }

  .hud {
    width:100%; max-width:520px; display:flex; justify-content:space-between;
    align-items:center; padding:.2rem 1rem; font-weight:700; font-size:1.05rem;
  }
  .hud .round { color:var(--lime); text-shadow:0 0 8px var(--lime); }
  .hud .best  { color:var(--yellow); text-shadow:0 0 8px var(--yellow); }
  .status {
    width:100%; max-width:520px; text-align:center; min-height:1.6em;
    font-family:'Bungee',sans-serif; font-size:clamp(.9rem,3.5vw,1.15rem);
    letter-spacing:1px; color:var(--cyan); text-shadow:0 0 10px var(--cyan); padding:.3rem 1rem;
  }

  .board {
    position:relative; width:min(86vw, 420px); aspect-ratio:1/1;
    display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:14px; margin:.4rem auto 0;
    border-radius:50%; background:rgba(0,0,0,.35);
    box-shadow:0 0 30px rgba(0,240,255,.25), inset 0 0 30px rgba(0,0,0,.6);
  }
  .pad {
    border:none; cursor:pointer; opacity:.45;
    transition:opacity .08s, box-shadow .12s, transform .08s, filter .12s;
    filter:saturate(.7) brightness(.7);
  }
  .pad:disabled { cursor:default; }
  .pad.tl { border-radius:100% 0 0 0; background:var(--lime);   }
  .pad.tr { border-radius:0 100% 0 0; background:var(--pink);   }
  .pad.bl { border-radius:0 0 0 100%; background:var(--yellow); }
  .pad.br { border-radius:0 0 100% 0; background:var(--cyan);   }
  .pad.lit {
    opacity:1; filter:saturate(1.4) brightness(1.5);
    transform:scale(1.03);
  }
  .pad.tl.lit { box-shadow:0 0 40px 6px var(--lime); }
  .pad.tr.lit { box-shadow:0 0 40px 6px var(--pink); }
  .pad.bl.lit { box-shadow:0 0 40px 6px var(--yellow); }
  .pad.br.lit { box-shadow:0 0 40px 6px var(--cyan); }

  .hub {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:34%; height:34%; border-radius:50%;
    background:radial-gradient(circle at 50% 35%, #2a0b4d, #11002b);
    box-shadow:0 0 0 6px rgba(0,0,0,.5), inset 0 0 18px rgba(0,0,0,.8);
    display:flex; align-items:center; justify-content:center;
    font-family:'Bungee',sans-serif; font-size:clamp(1.4rem,6vw,2.4rem);
    color:#fff; pointer-events:none;
  }
  .hub.shake { animation:shake .35s; }
  @keyframes shake {
    0%,100%{transform:translate(-50%,-50%);} 25%{transform:translate(-54%,-48%);}
    50%{transform:translate(-46%,-52%);} 75%{transform:translate(-52%,-49%);}
  }

  .controls { margin:1.1rem 0 .4rem; }
  .btn {
    font-family:'Bungee',sans-serif; text-transform:uppercase; cursor:pointer;
    border:3px solid #fff; border-radius:50px; padding:.7rem 1.8rem; font-size:1.05rem;
    color:var(--ink); background:var(--yellow); box-shadow:0 0 22px var(--yellow);
    transition:transform .12s, box-shadow .25s;
  }
  .btn:hover { transform:scale(1.06); box-shadow:0 0 34px var(--pink); }
  .btn.hidden { display:none; }

  footer { padding:.5rem; font-size:.8rem; opacity:.6; }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html">◄ Arcade</a>
    <h1>🎨 THEO SAYS</h1>
    <button class="mute" id="muteBtn" title="Toggle sound" aria-label="Toggle sound">🔊</button>
  </div>

  <div class="hud">
    <div class="round">Round: <span id="round">0</span></div>
    <div class="best">Best: <span id="best">0</span></div>
  </div>

  <div class="status" id="status">Press Start, then watch closely…</div>

  <div class="board" id="board">
    <button class="pad tl" data-pad="0" aria-label="green"></button>
    <button class="pad tr" data-pad="1" aria-label="pink"></button>
    <button class="pad bl" data-pad="2" aria-label="yellow"></button>
    <button class="pad br" data-pad="3" aria-label="cyan"></button>
    <div class="hub" id="hub">🧠</div>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn">▶ Start</button>
  </div>

  <footer>Theo's Arcade · How good's your memory?</footer>

<script>
(function () {
  "use strict";

  const pads    = Array.from(document.querySelectorAll('.pad'));
  const board   = document.getElementById('board');
  const hub      = document.getElementById('hub');
  const statusEl = document.getElementById('status');
  const roundEl  = document.getElementById('round');
  const bestEl   = document.getElementById('best');
  const startBtn = document.getElementById('startBtn');
  const muteBtn  = document.getElementById('muteBtn');

  const TONES = [329.63, 261.63, 392.00, 440.00]; // green, pink, yellow, cyan
  const WIN_CRIES   = ['Nice!','Sharp memory!','You got it!','Smooth!','🔥 Streak!','Brainy!'];
  const OVER_CRIES  = ['Brain freeze! 🥶','Oops, wrong pad!','So close!','The brain wins this round.','Memory overload!'];

  let sequence = [];        // the pattern to repeat
  let inputIdx = 0;         // how far the player has matched
  let state = 'idle';       // idle | showing | input | over
  let muted = false;

  const best = () => { try { return parseInt(localStorage.getItem('simonBest')||'0',10)||0; } catch(e){ return 0; } };
  const saveBest = v => { try { localStorage.setItem('simonBest', String(v)); } catch(e){} };
  const pick = arr => arr[(Math.random()*arr.length)|0];
  const wait = ms => new Promise(r => setTimeout(r, ms));

  // ---- audio ----
  let actx = null;
  function ensureAudio(){ try { if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); } catch(e){} }
  function tone(freq, dur, bad) {
    if (muted) return;
    try {
      ensureAudio();
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = bad ? 'sawtooth' : 'sine'; o.frequency.value = freq;
      o.connect(g); g.connect(actx.destination);
      const t = actx.currentTime;
      g.gain.setValueAtTime(.0001, t);
      g.gain.exponentialRampToValueAtTime(.14, t+.02);
      g.gain.exponentialRampToValueAtTime(.0001, t+(dur||.3));
      o.start(t); o.stop(t+(dur||.3)+.02);
    } catch(e){}
  }

  // ---- pad lighting ----
  async function flash(i, dur) {
    pads[i].classList.add('lit');
    tone(TONES[i], (dur||300)/1000);
    await wait(dur||300);
    pads[i].classList.remove('lit');
    await wait(Math.max(80, (dur||300)*0.35));
  }

  function setPadsEnabled(on) { pads.forEach(p => p.disabled = !on); }

  // ---- game flow ----
  function flashSpeed() {
    // playback gets quicker as the sequence grows
    return Math.max(220, 600 - (sequence.length-1)*28);
  }

  async function nextRound() {
    state = 'showing';
    setPadsEnabled(false);
    sequence.push((Math.random()*4)|0);
    inputIdx = 0;
    roundEl.textContent = sequence.length;
    hub.textContent = sequence.length;
    statusEl.textContent = 'Watch…';
    await wait(600);
    const d = flashSpeed();
    for (const i of sequence) await flash(i, d);
    state = 'input';
    setPadsEnabled(true);
    statusEl.textContent = 'Your turn! 🔁';
  }

  async function handlePress(i) {
    if (state !== 'input') return;
    // quick visual + tone feedback
    pads[i].classList.add('lit'); tone(TONES[i], .2);
    setTimeout(()=>pads[i].classList.remove('lit'), 180);

    if (i === sequence[inputIdx]) {
      inputIdx++;
      if (inputIdx === sequence.length) {
        // round cleared!
        state = 'showing';
        setPadsEnabled(false);
        statusEl.textContent = pick(WIN_CRIES);
        await wait(700);
        nextRound();
      }
    } else {
      gameOver();
    }
  }

  function gameOver() {
    state = 'over';
    setPadsEnabled(false);
    const reached = sequence.length - 1;     // last fully-completed round
    const b = best();
    if (reached > b) saveBest(reached);
    bestEl.textContent = Math.max(reached, b);
    statusEl.innerHTML = pick(OVER_CRIES) + ' &mdash; you reached round <b>' + reached + '</b>';
    // buzzer + flash all pads red-ish
    tone(110, .5, true);
    hub.textContent = '💀';
    hub.classList.remove('shake'); void hub.offsetWidth; hub.classList.add('shake');
    pads.forEach(p => { p.classList.add('lit'); });
    setTimeout(()=>pads.forEach(p=>p.classList.remove('lit')), 400);
    startBtn.textContent = '↻ Play Again';
    startBtn.classList.remove('hidden');
  }

  function startGame() {
    ensureAudio();
    sequence = []; inputIdx = 0;
    roundEl.textContent = '0';
    hub.textContent = '🧠';
    startBtn.classList.add('hidden');
    nextRound();
  }

  // ---- input wiring ----
  pads.forEach((p, i) => {
    p.addEventListener('pointerdown', e => { e.preventDefault(); handlePress(i); });
  });
  const KEYMAP = { 'q':0,'p':1,'z':2,'m':3, '1':0,'2':1,'3':2,'4':3 };
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k in KEYMAP) handlePress(KEYMAP[k]);
  });

  startBtn.addEventListener('click', startGame);
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('off', muted);
  });

  setPadsEnabled(false);
  bestEl.textContent = best();
})();
</script>
</body>
</html>
