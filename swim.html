<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#063047">
<title>Lou's Swim</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: #04141f; color: #e6f6ff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none; touch-action: none; user-select: none; -webkit-user-select: none;
  }
  #app { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 8px; }
  .topbar { width: 100%; max-width: 380px; }
  .topbar a { color: #5b8aa0; text-decoration: none; font-size: 13px; letter-spacing: 1px; }
  .topbar a:hover { color: #e6f6ff; }
  #scorebar {
    width: 100%; max-width: 380px; display: flex; justify-content: space-between; align-items: baseline;
    font-variant-numeric: tabular-nums; letter-spacing: 1.5px; text-transform: uppercase;
  }
  #scorebar .label { color: #5b8aa0; font-size: 10px; letter-spacing: 1.5px; }
  #scorebar .val { font-size: 20px; font-weight: 700; color: #6fe0ff; text-shadow: 0 0 8px rgba(111,224,255,0.5); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat.mid { text-align: center; } .stat.right { text-align: right; }
  #stamWrap { width: 100%; max-width: 380px; }
  #stamLabel { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #5b8aa0; margin-bottom: 3px; display: flex; justify-content: space-between; }
  #stamLabel .warn { color: #ff6b6b; font-weight: 700; opacity: 0; }
  #stamLabel .warn.on { opacity: 1; animation: blink 0.5s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
  #stamBar { height: 12px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); }
  #stamFill { height: 100%; width: 100%; border-radius: 99px; background: linear-gradient(90deg, #2bd47a, #7ee787); transition: background 0.2s ease; }
  #stage { position: relative; width: 100%; max-width: 380px; aspect-ratio: 360 / 560; }
  canvas { display: block; width: 100%; height: 100%; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; text-align: center; padding: 24px; cursor: pointer;
    background: rgba(4,20,31,0.72); backdrop-filter: blur(2px); border-radius: 12px; transition: opacity 0.15s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 { margin: 0; font-size: clamp(28px, 9vw, 42px); letter-spacing: 2px; color: #6fe0ff; text-shadow: 0 0 14px rgba(111,224,255,0.7); }
  #overlay p { margin: 0; color: #cfeaf6; font-size: 15px; line-height: 1.6; }
  #overlay .big { font-size: 24px; font-weight: 700; color: #6fe0ff; }
  #overlay .win { color: #7ee787; font-weight: 700; }
  #overlay .muted { color: #5b8aa0; font-size: 13px; }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><a href="index.html">← ALL GAMES</a></div>
  <div id="scorebar">
    <div class="stat"><span class="label">Distance</span><span class="val"><span id="dist">0</span>m</span></div>
    <div class="stat mid"><span class="label">Time</span><span class="val" id="time">0.0</span></div>
    <div class="stat right"><span class="label">Best</span><span class="val" id="best">—</span></div>
  </div>
  <div id="stamWrap">
    <div id="stamLabel"><span>Stamina</span><span class="warn" id="warn">EXHAUSTED!</span></div>
    <div id="stamBar"><div id="stamFill"></div></div>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1>🏊‍♀️ LOU'S SWIM</h1>
      <p>Tap as fast as you can to power Lou down the pool!<br><span class="muted">But watch her stamina — pace your sprints or she'll tire out.</span></p>
      <p class="pulse big">Tap to dive in!</p>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const W = 360, H = 560;
  const DIST = 50;                 // race length in metres
  const PXM = 44;                  // pixels per metre
  const LOU_Y = H - 150;           // Lou's fixed screen y
  const LANE_L = 52, LANE_R = W - 52;

  // feel tuning
  const STROKE = 0.62;             // m/s added per tap (before stamina factor)
  const DRAG = 1.5;                // velocity damping per second
  const STAM_MAX = 100;
  const STAM_COST = 4.4;           // stamina per tap
  const STAM_REGEN = 17;           // stamina per second
  const eff = (st) => 0.22 + 0.78 * (st / STAM_MAX);   // stroke effectiveness vs stamina

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const distEl = document.getElementById("dist");
  const timeEl = document.getElementById("time");
  const bestEl = document.getElementById("best");
  const stamFill = document.getElementById("stamFill");
  const warnEl = document.getElementById("warn");

  let state = "ready";     // ready | racing | done
  let pos, vel, stam, startMs, finishMs, ghostPos, best, nowMs = 0;
  let strokePhase = 0, kickPhase = 0;
  let bubbles = [];
  let raf = null, lastTs = 0;

  best = parseFloat(localStorage.getItem("swim_best") || "0") || 0;
  bestEl.textContent = best ? best.toFixed(2) + "s" : "—";

  function resize() {
    const size = document.getElementById("stage").clientWidth;
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width = size * dpr;
    canvas.height = size * (H / W) * dpr;
    ctx.setTransform((size / W) * dpr, 0, 0, (size / W) * dpr, 0, 0);
    draw();
  }
  window.addEventListener("resize", resize);

  function reset() {
    state = "ready";
    pos = 0; vel = 0; stam = STAM_MAX; ghostPos = 0;
    strokePhase = 0; kickPhase = 0; bubbles = [];
    showOverlay('<h1>🏊‍♀️ LOU\'S SWIM</h1>' +
      '<p>Tap as fast as you can to power Lou down the pool!<br><span class="muted">But watch her stamina — pace your sprints or she\'ll tire out.</span></p>' +
      '<p class="pulse big">Tap to dive in!</p>');
    updateHUD();
  }

  function startRace() {
    state = "racing";
    pos = 0; vel = 0; stam = STAM_MAX; ghostPos = 0;
    startMs = nowMs;
    overlay.classList.add("hidden");
  }

  function stroke() {
    vel += STROKE * eff(stam);
    stam = Math.max(0, stam - STAM_COST);
    strokePhase += Math.PI;        // alternate arms each tap
    // splash bubbles trailing behind Lou
    for (let i = 0; i < 3; i++) {
      bubbles.push({ d: pos - 0.1, x: (Math.random() * 2 - 1) * 16, r: 2 + Math.random() * 3, life: 0.7 });
    }
  }

  function finish() {
    state = "done";
    finishMs = nowMs;
    const t = (finishMs - startMs) / 1000;
    const beat = !best || t < best;
    if (beat) { best = t; localStorage.setItem("swim_best", String(t)); bestEl.textContent = best.toFixed(2) + "s"; }
    let result;
    if (beat) result = '<p class="win big">🏆 New best time!</p>';
    else result = '<p class="muted">Best: ' + best.toFixed(2) + 's</p>';
    showOverlay('<h1 style="font-size:34px">FINISH!</h1>' +
      '<p class="big">' + t.toFixed(2) + 's</p>' + result +
      '<p class="pulse muted">Tap to swim again</p>');
  }

  function showOverlay(html) { overlay.innerHTML = html; overlay.classList.remove("hidden"); }

  function tap() {
    if (state === "ready") { startRace(); stroke(); }
    else if (state === "racing") { stroke(); }
    else if (state === "done") { reset(); }
  }

  function update(dt) {
    if (state !== "racing") return;
    vel -= vel * DRAG * dt;
    if (vel < 0) vel = 0;
    pos += vel * dt;
    stam = Math.min(STAM_MAX, stam + STAM_REGEN * dt);
    kickPhase += dt * (6 + vel * 3);

    if (best) ghostPos = Math.min(DIST, (DIST / best) * ((nowMs - startMs) / 1000));

    for (const b of bubbles) b.life -= dt;
    bubbles = bubbles.filter(b => b.life > 0 && (pos - b.d) * PXM < H);

    if (pos >= DIST) { pos = DIST; finish(); }
    updateHUD();
  }

  function updateHUD() {
    distEl.textContent = Math.floor(pos);
    if (state === "racing") timeEl.textContent = ((nowMs - startMs) / 1000).toFixed(1);
    else if (state === "done") timeEl.textContent = ((finishMs - startMs) / 1000).toFixed(2);
    else timeEl.textContent = "0.0";
    const pct = stam / STAM_MAX;
    stamFill.style.width = (pct * 100) + "%";
    stamFill.style.background = pct > 0.5 ? "linear-gradient(90deg,#2bd47a,#7ee787)"
      : pct > 0.2 ? "linear-gradient(90deg,#ffae34,#ffd23f)"
      : "linear-gradient(90deg,#ff4f4f,#ff8a5d)";
    warnEl.classList.toggle("on", state === "racing" && stam < 18);
  }

  // world distance (m) -> screen y
  const screenY = (d) => LOU_Y - (d - pos) * PXM;

  function draw() {
    // water
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#0a7ea8"); g.addColorStop(0.5, "#0a6e9e"); g.addColorStop(1, "#064f78");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // lane wall shading
    ctx.fillStyle = "rgba(255,255,255,0.04)";
    ctx.fillRect(LANE_L, 0, LANE_R - LANE_L, H);

    // distance markers every 5 m + finish band
    ctx.textAlign = "left"; ctx.font = "11px -apple-system, sans-serif";
    for (let d = 0; d <= DIST; d += 5) {
      const y = screenY(d);
      if (y < -20 || y > H + 20) continue;
      if (d === DIST) {
        // checkered finish
        const cs = 12;
        for (let i = 0; i < (LANE_R - LANE_L) / cs; i++) {
          ctx.fillStyle = i % 2 ? "#ffffff" : "#0b2a3a";
          ctx.fillRect(LANE_L + i * cs, y - cs, cs, cs);
          ctx.fillStyle = i % 2 ? "#0b2a3a" : "#ffffff";
          ctx.fillRect(LANE_L + i * cs, y, cs, cs);
        }
      } else {
        ctx.strokeStyle = "rgba(255,255,255,0.14)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(LANE_L, y); ctx.lineTo(LANE_R, y); ctx.stroke();
        ctx.fillStyle = "rgba(230,246,255,0.5)";
        ctx.fillText(d + "m", LANE_L + 4, y - 3);
      }
    }

    // lane ropes (beaded) on both sides
    for (const lx of [LANE_L, LANE_R]) {
      const startD = Math.floor(pos) - 4;
      for (let d = startD; d < startD + 18; d += 0.5) {
        const y = screenY(d);
        if (y < -10 || y > H + 10) continue;
        ctx.fillStyle = (Math.round(d * 2) % 2) ? "#ffd23f" : "#e6f6ff";
        ctx.beginPath(); ctx.arc(lx, y, 3, 0, Math.PI * 2); ctx.fill();
      }
    }

    // bubbles
    for (const b of bubbles) {
      ctx.globalAlpha = Math.max(0, b.life) * 0.7;
      ctx.fillStyle = "#dff6ff";
      ctx.beginPath(); ctx.arc(W / 2 + b.x, screenY(b.d), b.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // ghost of best time
    if (best && state === "racing") {
      const gy = screenY(ghostPos);
      if (gy > -40 && gy < H + 40) drawLou(W / 2, gy, 1.3, 0.32, strokePhase * 0.7, kickPhase, "#9fd8ff", true);
    }

    // Lou
    drawLou(W / 2, LOU_Y, 1.45, 1, strokePhase, kickPhase, "#ff5d8f", false);
  }

  // Lou swims upward (top-down). Long black hair trails behind, arms do freestyle, legs flutter.
  function drawLou(cx, cy, s, alpha, phase, kick, suit, ghost) {
    ctx.globalAlpha = alpha;

    // trailing black hair / ponytail (behind = below, since she swims up)
    if (!ghost) {
      ctx.fillStyle = "#15110f";
      ctx.beginPath();
      ctx.moveTo(cx - 6 * s, cy + 4 * s);
      ctx.quadraticCurveTo(cx - 10 * s + Math.sin(kick) * 5 * s, cy + 26 * s, cx + Math.sin(kick * 1.1) * 4 * s, cy + 40 * s);
      ctx.quadraticCurveTo(cx + 10 * s + Math.sin(kick) * 5 * s, cy + 26 * s, cx + 6 * s, cy + 4 * s);
      ctx.closePath(); ctx.fill();
    }

    // legs / flutter kick + foot splash
    for (const side of [-1, 1]) {
      const fy = cy + 20 * s + Math.abs(Math.sin(kick + (side > 0 ? 1.6 : 0))) * 8 * s;
      const fx = cx + side * 4 * s + Math.sin(kick) * 2 * s;
      ctx.strokeStyle = ghost ? suit : "#f3c9a8"; ctx.lineWidth = 4 * s; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(cx + side * 3 * s, cy + 14 * s); ctx.lineTo(fx, fy); ctx.stroke();
      if (!ghost) { ctx.globalAlpha = alpha * 0.5; ctx.fillStyle = "#dff6ff"; ctx.beginPath(); ctx.arc(fx, fy + 3 * s, 3 * s, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = alpha; }
    }

    // torso (swimsuit)
    ctx.fillStyle = suit;
    ctx.beginPath(); ctx.ellipse(cx, cy, 9 * s, 19 * s, 0, 0, Math.PI * 2); ctx.fill();

    // arms — alternating freestyle stroke
    for (const side of [-1, 1]) {
      const aph = phase + (side < 0 ? Math.PI : 0);
      const reach = (Math.sin(aph) + 1) / 2;                 // 0 back .. 1 forward(up)
      const shX = cx + side * 7 * s, shY = cy - 7 * s;
      const haX = cx + side * (12 * s + reach * 3 * s);
      const haY = cy - 8 * s - reach * 26 * s;
      ctx.strokeStyle = ghost ? suit : "#f3c9a8"; ctx.lineWidth = 4.5 * s; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(shX, shY); ctx.lineTo(haX, haY); ctx.stroke();
      ctx.fillStyle = ghost ? suit : "#f7d6b8";
      ctx.beginPath(); ctx.arc(haX, haY, 3.2 * s, 0, Math.PI * 2); ctx.fill();
      if (!ghost && reach > 0.82) { ctx.globalAlpha = alpha * 0.55; ctx.fillStyle = "#dff6ff"; ctx.beginPath(); ctx.arc(haX, haY, 5 * s, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = alpha; }
    }

    // head: black hair cap + skin face tilted up to breathe
    ctx.fillStyle = ghost ? suit : "#15110f";
    ctx.beginPath(); ctx.arc(cx, cy - 17 * s, 8 * s, 0, Math.PI * 2); ctx.fill();
    if (!ghost) {
      ctx.fillStyle = "#f7d6b8";
      ctx.beginPath(); ctx.arc(cx, cy - 19 * s, 5.5 * s, 0, Math.PI * 2); ctx.fill();
      // goggles
      ctx.fillStyle = "#0b2a3a";
      ctx.beginPath(); ctx.arc(cx - 2.3 * s, cy - 20 * s, 1.6 * s, 0, Math.PI * 2);
      ctx.arc(cx + 2.3 * s, cy - 20 * s, 1.6 * s, 0, Math.PI * 2); ctx.fill();
    }

    ctx.globalAlpha = 1;
  }

  function loop(ts) {
    raf = requestAnimationFrame(loop);
    nowMs = ts;
    const dt = lastTs ? Math.min(0.05, (ts - lastTs) / 1000) : 0;
    lastTs = ts;
    update(dt);
    draw();
  }

  // input — every tap is a stroke
  function onTap(e) { if (e) e.preventDefault(); tap(); }
  canvas.addEventListener("pointerdown", onTap);
  overlay.addEventListener("pointerdown", onTap);
  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "Enter" || e.code === "ArrowUp") { e.preventDefault(); tap(); }
  });
  // pause/abandon if tab hidden mid-race
  document.addEventListener("visibilitychange", () => { if (document.hidden && state === "racing") reset(); });

  reset();
  resize();
  raf = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
