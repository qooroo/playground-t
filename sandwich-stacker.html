<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🥪 Sandwich Stacker — Theo's Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@500;700&display=swap');

  :root {
    --pink:#ff2bd6; --cyan:#00f0ff; --yellow:#ffe600; --lime:#7cff00;
    --orange:#ff8a00; --ink:#11002b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:'Fredoka', system-ui, sans-serif; color:#fff;
    background:
      radial-gradient(circle at 25% 15%, rgba(255,207,63,.30), transparent 45%),
      radial-gradient(circle at 80% 25%, rgba(255,43,214,.28), transparent 45%),
      linear-gradient(135deg,#2d0052,#1a0033 60%,#11002b);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; overflow:hidden; touch-action:none;
    user-select:none; -webkit-user-select:none;
  }

  .topbar {
    width:100%; max-width:520px; display:flex; align-items:center;
    justify-content:space-between; padding:.7rem 1rem .3rem; gap:.5rem;
  }
  .topbar a { color:var(--cyan); text-decoration:none; font-weight:700; font-size:.95rem; text-shadow:0 0 8px var(--cyan); }
  .topbar a:hover { color:var(--yellow); text-shadow:0 0 8px var(--yellow); }
  h1 {
    font-family:'Bungee', sans-serif; font-size:clamp(1.2rem,4.6vw,1.9rem);
    background:linear-gradient(90deg,var(--yellow),var(--orange),var(--pink));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 10px rgba(255,138,0,.6)); white-space:nowrap;
  }
  .mute { background:none; border:none; cursor:pointer; font-size:1.4rem; }
  .mute.off { opacity:.45; }

  .hud {
    width:100%; max-width:520px; display:flex; justify-content:space-between;
    align-items:center; padding:.2rem 1rem .4rem; font-weight:700; font-size:1.05rem;
  }
  .hud .layers { color:var(--lime); text-shadow:0 0 8px var(--lime); }
  .hud .best   { color:var(--yellow); text-shadow:0 0 8px var(--yellow); }

  .stage {
    position:relative; width:100%; max-width:520px; flex:1;
    margin:0 .5rem; border:4px solid var(--yellow); border-radius:18px;
    box-shadow:0 0 28px rgba(255,207,63,.4), inset 0 0 40px rgba(0,0,0,.35);
    overflow:hidden; background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.18));
  }
  canvas { display:block; width:100%; height:100%; }

  .popup {
    position:absolute; font-family:'Bungee',sans-serif; pointer-events:none;
    white-space:nowrap; transform:translate(-50%,-50%);
    animation:floatUp 1s ease-out forwards; text-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  @keyframes floatUp {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.6);}
    20%{opacity:1; transform:translate(-50%,-70%) scale(1.15);}
    100%{opacity:0; transform:translate(-50%,-170%) scale(1);}
  }

  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:1rem;
    background:rgba(17,0,43,.82); backdrop-filter:blur(4px); padding:1.5rem; z-index:5;
  }
  .overlay.hidden { display:none; }
  .overlay h2 { font-family:'Bungee',sans-serif; font-size:clamp(1.6rem,7vw,2.6rem);
    background:linear-gradient(90deg,var(--cyan),var(--yellow),var(--pink));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .overlay p { max-width:92%; line-height:1.45; font-size:1.05rem; }
  .overlay .big { font-size:3rem; line-height:1; }
  .btn {
    font-family:'Bungee',sans-serif; text-transform:uppercase; cursor:pointer;
    border:3px solid #fff; border-radius:50px; padding:.8rem 2rem; font-size:1.1rem;
    color:var(--ink); background:var(--yellow); box-shadow:0 0 22px var(--yellow);
    transition:transform .12s, box-shadow .25s;
  }
  .btn:hover { transform:scale(1.06); box-shadow:0 0 34px var(--pink); }
  .hint { opacity:.8; font-size:.95rem; }

  footer { padding:.5rem; font-size:.8rem; opacity:.6; }
</style>
</head>
<body>

  <div class="topbar">
    <a href="index.html">◄ Arcade</a>
    <h1>🥪 SANDWICH STACKER</h1>
    <button class="mute" id="muteBtn" title="Toggle sound" aria-label="Toggle sound">🔊</button>
  </div>

  <div class="hud">
    <div class="layers">Layers: <span id="layers">0</span></div>
    <div class="best">Best: <span id="best">0</span></div>
  </div>

  <div class="stage" id="stage">
    <canvas id="game"></canvas>

    <div class="overlay" id="startScreen">
      <div class="big">🍞🥬🍅🧀</div>
      <h2>Sandwich Stacker</h2>
      <p>Drop each ingredient to stack it. Overhang gets <b>sliced off</b> — line it up perfectly to keep your sandwich wide!</p>
      <p class="hint">Tap / click / press Space to drop.</p>
      <button class="btn" id="startBtn">▶ Start Stacking</button>
    </div>

    <div class="overlay hidden" id="overScreen">
      <div class="big" id="overEmoji">🥪</div>
      <h2 id="overTitle">Toppled!</h2>
      <p id="overMsg"></p>
      <p>Layers: <b id="finalLayers">0</b><br><span style="color:var(--yellow)">Best: <span id="bestScore">0</span></span></p>
      <button class="btn" id="againBtn">↻ Stack Again</button>
    </div>
  </div>

  <footer>Theo's Arcade · Hold the pickles!</footer>

<script>
(function () {
  "use strict";

  const stage   = document.getElementById('stage');
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const layersEl= document.getElementById('layers');
  const bestEl  = document.getElementById('best');
  const startScreen = document.getElementById('startScreen');
  const overScreen  = document.getElementById('overScreen');
  const startBtn = document.getElementById('startBtn');
  const againBtn = document.getElementById('againBtn');
  const muteBtn  = document.getElementById('muteBtn');
  const finalLayersEl = document.getElementById('finalLayers');
  const bestScoreEl   = document.getElementById('bestScore');
  const overMsgEl     = document.getElementById('overMsg');
  const overEmojiEl   = document.getElementById('overEmoji');
  const overTitleEl   = document.getElementById('overTitle');

  const INGREDIENTS = [
    { c:'#8fd14f', e:'🥬' }, { c:'#ff5a5a', e:'🍅' }, { c:'#ffcf3f', e:'🧀' },
    { c:'#a9613a', e:'🥩' }, { c:'#f0a93f', e:'🧅' }, { c:'#c0392b', e:'🥓' },
    { c:'#fff1c9', e:'🍳' }, { c:'#9b59b6', e:'🍆' }, { c:'#7cc576', e:'🥒' },
  ];
  const BREAD = { c:'#e8b54d', e:'🍞' };
  const PERFECT_CRIES = ['PERFECT! 🥪','BULLSEYE!','SO FRESH!','CHEF\'S KISS!','STACKED!'];
  const OVER_LINES = [
    "Your sandwich slid right off the plate!",
    "Wobble too wild — splat!",
    "That last layer missed completely.",
    "Gravity: 1, Sandwich: 0.",
    "Messy! The dog got the rest.",
  ];

  let W=0, H=0, dpr=1;
  let SH=28, baseW=0;
  let slabs=[];          // placed layers, bottom-first: {x,w,y,c,e}
  let moving=null;       // {x,w,y,dir,speed,c,e}
  let falling=[];        // overhang/tumble bits: {x,y,w,h,vx,vy,rot,vr,c,e}
  let cameraY=0;
  let layers=0, perfectStreak=0;
  let state='idle';      // idle | moving | over
  let muted=false;
  let lastT=0;

  const best = () => { try { return parseInt(localStorage.getItem('sandwichBest')||'0',10)||0; } catch(e){ return 0; } };
  const saveBest = v => { try { localStorage.setItem('sandwichBest', String(v)); } catch(e){} };
  const rand = (a,b)=>a+Math.random()*(b-a);
  const pick = arr=>arr[(Math.random()*arr.length)|0];

  // ---- audio ----
  let actx=null;
  function ensureAudio(){ try{ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); }catch(e){} }
  function blip(freq,dur,type){
    if(muted) return;
    try{
      ensureAudio();
      const o=actx.createOscillator(), g=actx.createGain();
      o.type=type||'square'; o.frequency.value=freq;
      o.connect(g); g.connect(actx.destination);
      const t=actx.currentTime;
      g.gain.setValueAtTime(.12,t);
      g.gain.exponentialRampToValueAtTime(.0001,t+(dur||.12));
      o.start(t); o.stop(t+(dur||.12));
    }catch(e){}
  }

  function resize(){
    const r=stage.getBoundingClientRect();
    W=r.width; H=r.height; dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=W*dpr; canvas.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    SH=Math.max(22, Math.min(34, H*0.055));
    baseW=Math.min(W*0.55, 230);
  }
  window.addEventListener('resize', resize);

  function popup(text,x,y,color){
    const el=document.createElement('div');
    el.className='popup'; el.textContent=text;
    el.style.left=x+'px'; el.style.top=(y+cameraY)+'px';
    el.style.color=color||'#fff';
    el.style.fontSize=(Math.random()*0.3+1)+'rem';
    stage.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }

  function spawnMoving(){
    const top=slabs[slabs.length-1];
    const ing=pick(INGREDIENTS);
    const fromLeft=Math.random()<0.5;
    moving={
      x: fromLeft ? -top.w*0+0 : W-top.w,
      w: top.w, y: top.y-SH,
      dir: fromLeft?1:-1,
      speed: 2.2 + layers*0.16,
      c:ing.c, e:ing.e,
    };
    moving.x = fromLeft ? 0 : W-top.w;
  }

  function startGame(){
    resize();
    slabs=[]; falling=[]; moving=null; cameraY=0; layers=0; perfectStreak=0;
    const bx=(W-baseW)/2, by=H-70-SH;
    slabs.push({x:bx, w:baseW, y:by, c:BREAD.c, e:BREAD.e});
    layersEl.textContent='0';
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    state='moving';
    ensureAudio();
    spawnMoving();
  }

  function dropSlab(){
    if(state!=='moving' || !moving) return;
    const top=slabs[slabs.length-1];
    const dx=moving.x - top.x;
    const adx=Math.abs(dx);

    if(adx >= top.w){      // total miss -> topple
      // the whole moving piece falls
      falling.push({x:moving.x, y:moving.y, w:moving.w, h:SH, vx:moving.dir*2, vy:-2, rot:0, vr:rand(-.2,.2), c:moving.c, e:moving.e});
      moving=null;
      return gameOver(false);
    }

    let newX, newW;
    const PERFECT = Math.max(5, W*0.018);
    if(adx < PERFECT){
      // perfect! keep width, small regrow toward base, bonus
      newX = top.x;
      newW = Math.min(baseW, top.w + 6);
      perfectStreak++;
      blip(880+Math.min(perfectStreak,6)*60,.12,'square');
      popup(pick(PERFECT_CRIES), top.x+top.w/2, moving.y, '#ffe600');
    } else {
      // slice overhang
      perfectStreak=0;
      const overlapLeft = Math.max(moving.x, top.x);
      newW = top.w - adx;
      newX = overlapLeft;
      blip(440,.08,'square');
      // overhang fragment falls off the open side
      if(dx>0) falling.push({x:top.x+top.w, y:moving.y, w:adx, h:SH, vx:rand(1.5,3), vy:-1, rot:0, vr:rand(.05,.3), c:moving.c, e:moving.e});
      else     falling.push({x:moving.x,     y:moving.y, w:adx, h:SH, vx:-rand(1.5,3), vy:-1, rot:0, vr:-rand(.05,.3), c:moving.c, e:moving.e});
    }

    slabs.push({x:newX, w:newW, y:moving.y, c:moving.c, e:moving.e});
    layers++;
    layersEl.textContent=layers;
    moving=null;
    spawnMoving();
  }

  function gameOver(){
    state='over';
    const b=best();
    if(layers>b) saveBest(layers);
    // tumble the top few layers for drama
    const n=slabs.length;
    for(let i=Math.max(1,n-4); i<n; i++){
      const s=slabs[i];
      falling.push({x:s.x, y:s.y, w:s.w, h:SH, vx:rand(-3,3), vy:rand(-3,-1), rot:0, vr:rand(-.25,.25), c:s.c, e:s.e});
    }
    slabs.length=Math.max(1, n-4);
    blip(160,.3,'sawtooth'); setTimeout(()=>blip(110,.35,'sawtooth'),90);
    setTimeout(()=>{
      finalLayersEl.textContent=layers;
      bestScoreEl.textContent=Math.max(layers,b);
      overMsgEl.textContent=pick(OVER_LINES);
      overTitleEl.textContent = layers>b && layers>0 ? 'New Record!' : 'Toppled!';
      overEmojiEl.textContent = layers>b && layers>0 ? '🏆' : '🥪';
      overScreen.classList.remove('hidden');
    }, 750);
  }

  // ---- loop ----
  function update(dt){
    if(state==='moving' && moving){
      moving.x += moving.dir*moving.speed*dt/16;
      if(moving.x<=0){ moving.x=0; moving.dir=1; }
      const maxX=W-moving.w;
      if(moving.x>=maxX){ moving.x=maxX; moving.dir=-1; }
    }
    // falling debris physics
    for(let i=falling.length-1;i>=0;i--){
      const f=falling[i];
      f.vy += 0.5*dt/16;
      f.x += f.vx*dt/16; f.y += f.vy*dt/16; f.rot += f.vr*dt/16;
      if(f.y - cameraY > H + 80) falling.splice(i,1);
    }
    // camera: scroll up so the active layer stays in view
    const topY = moving ? moving.y : (slabs.length? slabs[slabs.length-1].y : 0);
    const desired = Math.max(0, H*0.34 - topY);
    cameraY += (desired - cameraY) * Math.min(1, dt/120);
  }

  function roundRect(x,y,w,h,r){
    r=Math.min(r,h/2,w/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function drawSlab(x,y,w,c,e){
    roundRect(x,y,w,SH,8);
    ctx.fillStyle=c; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.stroke();
    // top sheen
    roundRect(x+3,y+3,w-6,SH*0.4,6);
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fill();
    if(w>26 && e){
      ctx.font=(SH*0.78)+'px serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(e, x+w/2, y+SH/2+1);
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(0, cameraY);
    for(const s of slabs) drawSlab(s.x,s.y,s.w,s.c,s.e);
    if(moving) drawSlab(moving.x,moving.y,moving.w,moving.c,moving.e);
    for(const f of falling){
      ctx.save();
      ctx.translate(f.x+f.w/2, f.y+f.h/2); ctx.rotate(f.rot);
      drawSlab(-f.w/2,-f.h/2,f.w,f.c,f.e);
      ctx.restore();
    }
    ctx.restore();
  }

  function frame(t){
    const dt=Math.min(48, t-lastT); lastT=t;
    update(dt); draw();
    requestAnimationFrame(frame);
  }

  // ---- input ----
  function tryDrop(e){ if(e) e.preventDefault(); if(state==='moving') dropSlab(); }
  stage.addEventListener('pointerdown', tryDrop);
  window.addEventListener('keydown', e=>{ if(e.code==='Space'||e.key===' '){ e.preventDefault(); tryDrop(); } });

  startBtn.addEventListener('click', startGame);
  againBtn.addEventListener('click', startGame);
  muteBtn.addEventListener('click', ()=>{
    muted=!muted; muteBtn.textContent=muted?'🔇':'🔊'; muteBtn.classList.toggle('off',muted);
  });

  resize();
  bestEl.textContent=best();
  lastT=performance.now();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
