<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0e14">
<title>Snake</title>
<style>
  :root {
    --bg: #0a0e14;
    --grid: #11161f;
    --snake: #39d353;
    --snake-glow: #39d35377;
    --head: #7ee787;
    --food: #ff5d5d;
    --food-glow: #ff5d5d99;
    --text: #e6edf3;
    --muted: #7d8590;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px;
  }
  #scorebar {
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }
  #scorebar .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; }
  #scorebar .val { font-size: 22px; font-weight: 700; }
  .stat { display: flex; flex-direction: column; }
  .stat.best { text-align: right; }
  #stage {
    position: relative;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1 / 1;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: var(--grid);
    border-radius: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.04);
    touch-action: none;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-align: center;
    padding: 20px;
    background: rgba(10,14,20,0.82);
    backdrop-filter: blur(3px);
    border-radius: 14px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 { margin: 0; font-size: clamp(28px, 9vw, 44px); letter-spacing: 2px; }
  #overlay h1 .emoji { filter: drop-shadow(0 0 12px var(--snake-glow)); }
  #overlay p { margin: 0; color: var(--muted); font-size: 15px; line-height: 1.5; }
  #overlay .big { font-size: 20px; color: var(--text); font-weight: 700; }
  .pulse { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
  #hint { color: var(--muted); font-size: 12px; height: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="scorebar">
    <div class="stat"><span class="label">Score</span><span class="val" id="score">0</span></div>
    <div class="stat best"><span class="label">Best</span><span class="val" id="best">0</span></div>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1><span class="emoji">🐍</span> SNAKE</h1>
      <p id="overlay-msg" class="pulse">Tap to start<br><span style="font-size:13px">Swipe or use arrow keys</span></p>
    </div>
  </div>
  <div id="hint"></div>
</div>

<script>
(() => {
  "use strict";

  const COLS = 20, ROWS = 20;
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const overlayMsg = document.getElementById("overlay-msg");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const hintEl = document.getElementById("hint");

  const BASE_SPEED = 6;      // moves per second at start
  const MAX_SPEED = 16;      // cap
  const SPEED_STEP = 0.4;    // added per apple

  let cell = 24;             // pixel size of a grid cell (set on resize)
  let snake, dir, nextDir, food, score, best, speed;
  let state = "idle";        // idle | playing | dead
  let acc = 0, last = 0, raf = null;

  best = parseInt(localStorage.getItem("snake_best") || "0", 10) || 0;
  bestEl.textContent = best;

  // --- Responsive canvas (square, crisp on retina) ---
  function resize() {
    const stage = document.getElementById("stage");
    const size = Math.floor(stage.clientWidth);
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cell = size / COLS;
    draw();
  }
  window.addEventListener("resize", resize);

  function reset() {
    const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
    snake = [{x: cx - 1, y: cy}, {x: cx - 2, y: cy}, {x: cx - 3, y: cy}];
    dir = {x: 1, y: 0};
    nextDir = dir;
    score = 0;
    speed = BASE_SPEED;
    placeFood();
    scoreEl.textContent = score;
  }

  function placeFood() {
    while (true) {
      const f = {x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0};
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function start() {
    reset();
    state = "playing";
    overlay.classList.add("hidden");
    hintEl.textContent = "";
    acc = 0; last = performance.now();
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  function gameOver() {
    state = "dead";
    if (score > best) {
      best = score;
      localStorage.setItem("snake_best", String(best));
      bestEl.textContent = best;
    }
    overlayMsg.innerHTML =
      `<span class="big">Game over</span><br>Score ${score} &nbsp;·&nbsp; Best ${best}<br>` +
      `<span style="font-size:13px">Tap to play again</span>`;
    overlay.classList.remove("hidden");
    overlayMsg.classList.add("pulse");
  }

  function step() {
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // Wrap around walls: exit one edge, reappear on the opposite side
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;
    // Self collision (ignore tail tip, which will move away unless we grow)
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) { gameOver(); return; }
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      speed = Math.min(MAX_SPEED, speed + SPEED_STEP);
      placeFood();
    } else {
      snake.pop();
    }
  }

  function loop(now) {
    raf = requestAnimationFrame(loop);
    if (state !== "playing") return;
    const dt = (now - last) / 1000;
    last = now;
    acc += dt;
    const interval = 1 / speed;
    while (acc >= interval) {
      acc -= interval;
      step();
      if (state !== "playing") break;
    }
    draw();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    const size = COLS * cell;
    ctx.clearRect(0, 0, size, size);

    // subtle grid
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * cell, 0); ctx.lineTo(i * cell, size); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cell); ctx.lineTo(size, i * cell); ctx.stroke();
    }

    if (!snake) return;

    // food
    const pad = cell * 0.18;
    ctx.shadowColor = getCss("--food-glow");
    ctx.shadowBlur = cell * 0.6;
    ctx.fillStyle = getCss("--food");
    roundRect(food.x * cell + pad, food.y * cell + pad, cell - pad * 2, cell - pad * 2, (cell - pad * 2) / 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // snake
    const r = cell * 0.28;
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const head = i === 0;
      ctx.fillStyle = head ? getCss("--head") : getCss("--snake");
      if (head) { ctx.shadowColor = getCss("--snake-glow"); ctx.shadowBlur = cell * 0.5; }
      const sp = cell * 0.08;
      roundRect(s.x * cell + sp, s.y * cell + sp, cell - sp * 2, cell - sp * 2, r);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function getCss(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  // --- Input ---
  function setDir(x, y) {
    // prevent 180° reversal
    if (x === -dir.x && y === -dir.y) return;
    nextDir = {x, y};
  }

  const KEYMAP = {
    ArrowUp: [0, -1], KeyW: [0, -1],
    ArrowDown: [0, 1], KeyS: [0, 1],
    ArrowLeft: [-1, 0], KeyA: [-1, 0],
    ArrowRight: [1, 0], KeyD: [1, 0],
  };

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code.startsWith("Arrow")) e.preventDefault();
    if (state === "paused") {
      state = "playing";
      overlay.classList.add("hidden");
      last = performance.now();
      return;
    }
    if (state !== "playing") {
      if (e.code === "Space" || e.code === "Enter" || KEYMAP[e.code]) start();
      return;
    }
    const k = KEYMAP[e.code];
    if (k) setDir(k[0], k[1]);
  }, {passive: false});

  // Touch: tap to start, swipe to steer
  let tStart = null;
  canvas.addEventListener("touchstart", (e) => {
    const t = e.changedTouches[0];
    tStart = {x: t.clientX, y: t.clientY};
  }, {passive: true});

  canvas.addEventListener("touchend", (e) => {
    if (!tStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - tStart.x, dy = t.clientY - tStart.y;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (Math.max(adx, ady) < 14) {
      // treat as tap
      if (state !== "playing") start();
    } else if (state === "playing") {
      if (adx > ady) setDir(dx > 0 ? 1 : -1, 0);
      else setDir(0, dy > 0 ? 1 : -1);
    }
    tStart = null;
  }, {passive: true});

  overlay.addEventListener("click", () => {
    if (state === "paused") {
      state = "playing";
      overlay.classList.add("hidden");
      last = performance.now();
    } else if (state !== "playing") {
      start();
    }
  });

  // pause when tab hidden
  document.addEventListener("visibilitychange", () => {
    if (document.hidden && state === "playing") {
      state = "paused";
      overlayMsg.classList.remove("pulse");
      overlayMsg.innerHTML = '<span class="big">Paused</span><br><span style="font-size:13px">Tap to resume</span>';
      overlay.classList.remove("hidden");
    }
  });

  resize();
  draw();
})();
</script>
</body>
</html>
