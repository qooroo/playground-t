<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏐 Neon Volley — Adie's Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Poppins:wght@500;700&display=swap');

  :root {
    --pool:#0bd3ff; --magenta:#ff2bce; --lime:#aaff00; --sun:#ffd23f;
    --violet:#8a2bff; --deep:#03102e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family:'Poppins', system-ui, sans-serif; color:#fff;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,43,206,.30), transparent 45%),
      radial-gradient(circle at 80% 25%, rgba(11,211,255,.30), transparent 45%),
      linear-gradient(135deg,#0a1f5c,#05163f 60%,#03102e);
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; overflow:hidden; touch-action:none;
    user-select:none; -webkit-user-select:none;
  }

  .topbar {
    width:100%; max-width:560px; display:flex; align-items:center;
    justify-content:space-between; padding:.7rem 1rem .3rem; gap:.5rem;
  }
  .topbar a { color:var(--pool); text-decoration:none; font-weight:700; font-size:.95rem; text-shadow:0 0 8px var(--pool); white-space:nowrap; }
  .topbar a:hover { color:var(--lime); text-shadow:0 0 8px var(--lime); }
  h1 {
    font-family:'Audiowide', sans-serif; font-size:clamp(1.1rem,4.4vw,1.8rem);
    background:linear-gradient(90deg,var(--pool),var(--magenta),var(--lime));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 10px rgba(11,211,255,.6)); white-space:nowrap;
  }
  .mute { background:none; border:none; cursor:pointer; font-size:1.4rem; }
  .mute.off { opacity:.45; }

  .hud {
    width:100%; max-width:560px; display:flex; justify-content:space-between;
    align-items:center; gap:.8rem; padding:.2rem 1rem .4rem; font-weight:700; font-size:1rem;
  }
  .score { color:var(--sun); text-shadow:0 0 8px var(--sun); white-space:nowrap; font-family:'Audiowide',sans-serif; font-size:.95rem; }
  .streak { color:var(--magenta); text-shadow:0 0 8px var(--magenta); white-space:nowrap; font-family:'Audiowide',sans-serif; font-size:.95rem; }

  .stage {
    position:relative; width:100%; max-width:560px; flex:1;
    margin:0 .5rem; border:4px solid var(--pool); border-radius:18px;
    box-shadow:0 0 28px rgba(11,211,255,.4), inset 0 0 40px rgba(0,0,0,.35);
    overflow:hidden; background:linear-gradient(180deg,rgba(11,211,255,.08),rgba(0,0,0,.25));
  }
  canvas {
    display:block; width:100%; height:100%;
    pointer-events:none;
  }

  .countdown {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Audiowide',sans-serif; font-size:clamp(3rem,16vw,6rem);
    color:#fff; text-shadow:0 0 24px var(--magenta); pointer-events:none; z-index:4;
  }
  .countdown.hidden { display:none; }

  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:1rem;
    background:rgba(3,16,46,.85); backdrop-filter:blur(4px); padding:1.5rem; z-index:5;
  }
  .overlay.hidden { display:none; }
  .overlay h2 { font-family:'Audiowide',sans-serif; font-size:clamp(1.6rem,7vw,2.6rem);
    background:linear-gradient(90deg,var(--pool),var(--lime),var(--magenta));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .overlay p { max-width:92%; line-height:1.45; font-size:1.05rem; }
  .overlay .big { font-size:3rem; line-height:1; }
  .btn {
    font-family:'Audiowide',sans-serif; text-transform:uppercase; cursor:pointer;
    border:3px solid #fff; border-radius:50px; padding:.8rem 2rem; font-size:1.05rem;
    color:var(--deep); background:var(--pool); box-shadow:0 0 22px var(--pool);
    transition:transform .12s, box-shadow .25s;
  }
  .btn:hover { transform:scale(1.06); box-shadow:0 0 34px var(--magenta); }
  .hint { opacity:.8; font-size:.95rem; }

  .combo-pop {
    position:absolute; font-family:'Audiowide',sans-serif; font-size:1.5rem;
    color:var(--sun); text-shadow:0 0 12px var(--sun); pointer-events:none;
    z-index:3; animation: comboAnim .7s ease-out forwards;
  }
  @keyframes comboAnim {
    0%   { transform: scale(.5); opacity:1; }
    50%  { transform: scale(1.4); opacity:1; }
    100% { transform: scale(1) translateY(-60px); opacity:0; }
  }

  footer { padding:.5rem; font-size:.8rem; opacity:.6; }
</style>
</head>
<body>

  <div class="topbar">
    <a href="adie-arcade.html">◄ Adie's Arcade</a>
    <h1>🏐 NEON VOLLEY</h1>
    <button class="mute" id="muteBtn" title="Toggle sound" aria-label="Toggle sound">🔊</button>
  </div>

  <div class="hud">
    <div class="score" id="scoreEl">Score: 0</div>
    <div class="streak" id="streakEl">Streak: 0</div>
  </div>

  <div class="stage" id="stage">
    <canvas id="gameCanvas"></canvas>
    <div class="countdown hidden" id="countdownEl"></div>
    <div class="overlay hidden" id="startScreen">
      <span class="big">🏐</span>
      <h2>NEON VOLLEY</h2>
      <p>Ball goes up on your side — tap to send it over the net!</p>
      <p class="hint">The closer to the peak you hit, the stronger the spike.</p>
      <button class="btn" id="startBtn">Play</button>
    </div>
    <div class="overlay hidden" id="overScreen">
      <span class="big" id="overEmoji">🏐</span>
      <h2 id="overTitle">Game Over</h2>
      <p id="overMsg">Better luck next time!</p>
      <p>Score: <span id="finalScoreEl" class="big">0</span></p>
      <p>Best streak: <span id="bestStreakEl">0</span></p>
      <button class="btn" id="againBtn">Play Again</button>
    </div>
  </div>

  <footer>Adie's Arcade · Neon Volley</footer>

<script>
(() => {
  // ---- config ----
  const GRAVITY       = 600;
  const NET_H_RATIO   = 0.35;
  const BALL_R        = 14;
  const MIN_POWER     = 180;   // minimum forward speed
  const MAX_POWER     = 260;   // maximum forward speed
  const AI_RETURN_VY  = 380;
  const AI_SERVE_X    = -100;
  const LIVES         = 3;

  const stage   = document.getElementById('stage');
  const canvas  = document.getElementById('gameCanvas');
  const ctx     = canvas.getContext('2d');
  const scoreEl = document.getElementById('scoreEl');
  const streakEl = document.getElementById('streakEl');
  const startScreen = document.getElementById('startScreen');
  const overScreen  = document.getElementById('overScreen');
  const countdownEl = document.getElementById('countdownEl');
  const startBtn    = document.getElementById('startBtn');
  const againBtn    = document.getElementById('againBtn');
  const muteBtn     = document.getElementById('muteBtn');
  const finalScoreEl = document.getElementById('finalScoreEl');
  const bestStreakEl = document.getElementById('bestStreakEl');
  const overEmoji   = document.getElementById('overEmoji');
  const overTitle   = document.getElementById('overTitle');
  const overMsg     = document.getElementById('overMsg');

  let W, H, courtY, netX, netTop;

  function resize(){
    const rect = stage.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    W = Math.floor(rect.width);
    H = Math.floor(rect.height);
    stage.style.width  = W + 'px';
    stage.style.height = H + 'px';
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    courtY = H - 20;
    netX = W * 0.5;
    netTop = courtY - H * NET_H_RATIO;
    ctx.imageSmoothingEnabled = false;
  }

  // ---- audio ----
  const AC = window.AudioContext || window.webkitAudioContext;
  let actx;
  function ensureAudio(){ if(!actx) actx = new AC(); }
  let muted = false;
  function blip(freq, dur, type='sine', vol=.18){
    if(muted||!actx) return;
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(.001, actx.currentTime + dur);
    o.connect(g).connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  }

  muteBtn.addEventListener('click', ()=>{
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    muteBtn.classList.toggle('off', muted);
  });

  // ---- game state ----
  let gameState = 'idle';
  let ball, score, lives, streak, bestStreak;
  let flash = 0;
  let lastT = 0;
  let animId;
  let lastX = netX;  // track previous x for net-crossing detection
  let hitPower = 0;  // power used on last hit

  function best(){
    try { return parseInt(localStorage.getItem('volley_best')||'0', 10); }
    catch(e){ return 0; }
  }
  function saveBest(v){
    try { localStorage.setItem('volley_best', String(v)); } catch(e){}
  }

  function launchBall(fromOpponent){
    lastX = netX;
    if(fromOpponent){
      ball = {
        x: netX + 50,
        y: courtY - 40,
        vx: -160,
        vy: -400,
        phase: 'rising'
      };
    } else {
      ball = {
        x: netX * 0.4,
        y: courtY - 40,
        vx: 30,
        vy: -550,
        phase: 'rising'
      };
    }
    flash = 0;
  }

  function startCountdown(){
    gameState = 'countdown';
    startScreen.classList.add('hidden');
    let count = 3;
    countdownEl.textContent = count;
    countdownEl.classList.remove('hidden');
    blip(440,.12,'square');
    const iv = setInterval(()=>{
      count--;
      if(count > 0){
        countdownEl.textContent = count;
        blip(440,.12,'square');
      } else {
        countdownEl.textContent = 'GO!';
        blip(660,.2,'square');
        clearInterval(iv);
        setTimeout(()=>{
          countdownEl.classList.add('hidden');
          startGame();
        }, 350);
      }
    }, 600);
  }

  function startGame(){
    ensureAudio();
    score = 0;
    lives = LIVES;
    streak = 0;
    bestStreak = Math.max(bestStreak || 0, best());
    gameState = 'playing';
    overScreen.classList.add('hidden');
    launchBall(false);
    updateHud();
    lastT = performance.now();
    if(!animId) animId = requestAnimationFrame(frame);
  }

  function updateHud(){
    scoreEl.textContent = 'Score: ' + score;
    streakEl.textContent = 'Streak: ' + streak + (streak >= 3 ? ' 🔥' : '');
  }

  function showComboPop(x, y, text){
    const el = document.createElement('div');
    el.className = 'combo-pop';
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    stage.appendChild(el);
    setTimeout(()=> el.remove(), 700);
  }

  function endGame(){
    gameState = 'over';
    saveBest(streak);
    const won = streak >= 10;
    overEmoji.textContent = won ? '🏆' : '😵';
    overTitle.textContent = won ? 'MVP!' : 'Game Over';
    overMsg.textContent = won
      ? 'Incredible streak! You are the neon queen!'
      : 'You ran out of lives.';
    finalScoreEl.textContent = score;
    bestStreakEl.textContent = streak;
    overScreen.classList.remove('hidden');
  }

  function scorePoint(){
    const base = 10;
    const powerBonus = Math.floor(hitPower / 30) * 3;
    score += base + powerBonus + streak * 3;
    streak++;
    if(streak % 5 === 0){
      showComboPop(netX, netTop + 30, streak + 'x COMBO! 🔥');
    }
    blip(880, .1, 'square');
    setTimeout(()=> blip(1100, .1, 'square'), 80);
    setTimeout(()=> blip(1320, .12, 'square'), 160);
    updateHud();
    // AI serves ball back to player's side (lob up, player taps to spike)
    setTimeout(()=> launchBall(true), 400);
  }

  function playerMissed(){
    lives--;
    streak = 0;
    updateHud();
    blip(150, .3, 'sawtooth');
    if(lives <= 0){
      endGame();
    } else {
      launchBall(false);
    }
  }

  function update(dt){
    lastX = ball.x;

    // ball physics
    ball.vy += GRAVITY * dt;
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // wall bounces
    if(ball.x < BALL_R){
      ball.x = BALL_R;
      ball.vx = Math.abs(ball.vx) * 0.4;
    }
    if(ball.x > W - BALL_R){
      ball.x = W - BALL_R;
      ball.vx = -Math.abs(ball.vx) * 0.4;
    }

    // net collision — deflect
    if(ball.x > netX - 4 - BALL_R && ball.x < netX + 4 + BALL_R
       && ball.y > netTop && ball.y < courtY){
      if(ball.vx > 0){
        ball.x = netX - 4 - BALL_R;
      } else {
        ball.x = netX + 4 + BALL_R;
      }
      ball.vx *= -0.2;
      blip(110, .2, 'square');
    }

    // ---- scoring: ball crossed the net ----
    if(ball.vx > 0 && lastX < netX && ball.x >= netX){
      // Ball crossed the net going right → player scored!
      if(ball.phase === 'hit'){
        scorePoint();
        ball.phase = 'scored';
      }
    }

    // ---- state machine ----

    // Track peak
    if(ball.phase === 'rising' && ball.vy >= 0){
      ball.phase = 'falling';
      blip(400, .06, 'sine');
    }

    // Ball hit ground — only if ball is on player's side (miss)
    if(ball.y >= courtY - BALL_R){
      ball.y = courtY - BALL_R;
      ball.vy = 0;
      ball.vx = 0;
      if(ball.phase === 'falling' && ball.x < netX){
        playerMissed();
      }
      return;
    }

    // Flash decay
    if(flash > 0) flash -= dt * 6;

    updateHud();
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);

    // court floor
    ctx.fillStyle = 'rgba(11,211,255,.08)';
    ctx.fillRect(0, courtY - 4, W, 4);

    // net
    ctx.strokeStyle = 'rgba(255,43,206,.8)';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ff2bce';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(netX, netTop);
    ctx.lineTo(netX, courtY);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // net top bar
    ctx.fillStyle = '#ff2bce';
    ctx.shadowColor = '#ff2bce';
    ctx.shadowBlur = 8;
    ctx.fillRect(netX - 3, netTop - 3, 6, 8);
    ctx.shadowBlur = 0;

    // side zones
    ctx.fillStyle = 'rgba(11,211,255,.04)';
    ctx.fillRect(0, 0, netX - 4, courtY);
    ctx.fillStyle = 'rgba(255,43,206,.04)';
    ctx.fillRect(netX + 4, 0, W - netX - 4, courtY);

    // flash
    if(flash > 0){
      ctx.save();
      ctx.fillStyle = `rgba(255,43,206,${flash * 0.25})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // draw ball
    if(ball){
      ctx.save();
      const bx = ball.x, by = ball.y;
      const glowSize = 16 + Math.min(streak * 2, 16);
      ctx.shadowColor = streak >= 5 ? '#ff2bce' : streak >= 3 ? '#ffd23f' : '#0bd3ff';
      ctx.shadowBlur = glowSize;
      ctx.font = '28px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🏐', bx, by);
      ctx.restore();
    }

    // lives
    ctx.save();
    ctx.font = '16px serif';
    ctx.textAlign = 'right';
    for(let i = 0; i < LIVES; i++){
      ctx.globalAlpha = i < lives ? 1 : .2;
      ctx.fillText('🏐', W - 12 - (LIVES - 1 - i) * 22, 24);
    }
    ctx.restore();

    // phase hints
    if(gameState === 'playing' && ball){
      if(ball.phase === 'rising'){
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,.4)';
        ctx.font = '16px Poppins, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('👆 TAP TO HIT!', ball.x, courtY - 50);
        ctx.restore();
      }
      if(ball.phase === 'falling'){
        ctx.save();
        ctx.fillStyle = 'rgba(255,210,63,.6)';
        ctx.font = 'bold 14px Audiowide, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('👆 TAP NOW!', ball.x, netTop - 15);
        ctx.restore();
      }
    }
  }

  function frame(t){
    const dt = Math.min(48, t - lastT) / 1000;
    lastT = t;
    if(gameState === 'playing') update(dt);
    if(gameState === 'playing' || gameState === 'countdown') draw();
    else if(gameState === 'idle') draw();
    animId = requestAnimationFrame(frame);
  }

  // ---- input ----
  function onTap(e){
    if(e) e.preventDefault();
    if(gameState !== 'playing') return;
    if(!ball) return;

    // Hit ball when it's on your side (left of net)
    if(ball.x < netX && (ball.phase === 'rising' || ball.phase === 'falling')){
      // Calculate spike power
      let power;
      if(ball.vy < 0){
        // Ball going up
        power = MAX_POWER - Math.abs(ball.vy) * 0.3;
      } else {
        // Ball falling
        power = Math.max(MIN_POWER, MAX_POWER - ball.vy * 0.5);
      }

      hitPower = power;
      ball.vx = power;
      ball.vy = -200;
      ball.phase = 'hit';
      flash = 1;

      blip(200, .15, 'sawtooth');
      stage.style.boxShadow = '0 0 50px #ff2bce, inset 0 0 60px rgba(0,0,0,.4)';
      setTimeout(()=>{ stage.style.boxShadow = '0 0 28px rgba(11,211,255,.4), inset 0 0 40px rgba(0,0,0,.35)'; }, 120);
    }
  }

  stage.addEventListener('pointerdown', onTap);

  startBtn.addEventListener('click', startCountdown);
  againBtn.addEventListener('click', startCountdown);

  // ---- init ----
  resize();
  bestStreak = best();
  lastT = performance.now();
  startScreen.classList.remove('hidden');
  draw();
  animId = requestAnimationFrame(frame);

  window.addEventListener('resize', resize);
})();
</script>
</body>
</html>
