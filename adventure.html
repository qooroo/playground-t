<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a1030">
<title>The Walk to School</title>
<style>
  :root {
    --bg1: #1a1030;
    --bg2: #2a1a4a;
    --card: rgba(255,255,255,0.06);
    --accent: #ffd23f;
    --accent2: #ff7eb6;
    --text: #f4f0ff;
    --muted: #c3b6e6;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; min-height: 100%; }
  body {
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    background-attachment: fixed;
    color: var(--text);
    font-family: "Comic Sans MS", "Chalkboard SE", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.55;
    padding: 18px;
    display: flex;
    justify-content: center;
  }
  #wrap { width: 100%; max-width: 560px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .topbar a { color: var(--muted); text-decoration: none; font-size: 14px; }
  .topbar a:hover { color: var(--text); }
  h1 { font-size: clamp(24px, 7vw, 34px); margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
  #scene {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 20px 20px 22px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    animation: pop 0.28s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
  #text { font-size: clamp(17px, 4.6vw, 20px); margin: 0 0 18px; white-space: pre-wrap; }
  .choices { display: flex; flex-direction: column; gap: 11px; }
  button.choice {
    font-family: inherit;
    font-size: clamp(16px, 4.4vw, 18px);
    text-align: left;
    color: var(--text);
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.14);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  }
  button.choice:hover { background: rgba(255,210,63,0.18); border-color: var(--accent); }
  button.choice:active { transform: scale(0.98); }
  .ending #text { font-size: clamp(19px, 5vw, 23px); font-weight: 700; }
  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #2a1a4a;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 999px;
    margin-bottom: 14px;
    font-size: 14px;
    letter-spacing: 0.3px;
  }
  button.again {
    font-family: inherit;
    font-size: 18px;
    font-weight: 700;
    color: #2a1a4a;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    width: 100%;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  button.again:hover { filter: brightness(1.05); }
  button.again:active { transform: scale(0.98); }
  .steps { text-align: center; color: var(--muted); font-size: 13px; margin-top: 14px; }
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <a href="index.html">← All games</a>
    <span id="stepcount"></span>
  </div>
  <h1>🚶 The Walk to School</h1>
  <div class="sub">A very normal, totally ordinary morning. Probably.</div>
  <div id="scene"></div>
</div>

<script>
(() => {
  "use strict";

  const story = {
    start: {
      text: "BRRRING! 🔔 You overslept! It's 8:42 and school starts at 8:50. Your shoes are on the wrong feet but there is NO TIME for that.\n\nYou burst out the front door clutching a single piece of toast. 🍞 Which way do you go?",
      choices: [
        { label: "🌳 Take the shortcut through Wobbly Woods", to: "woods" },
        { label: "🚶 Stick to the normal, sensible sidewalk", to: "sidewalk" },
      ],
    },

    woods: {
      text: "The woods are quiet. TOO quiet.\n\nSuddenly a squirrel wearing tiny sunglasses hops onto a stump. 'Halt,' it says in a surprisingly deep voice. 'This is a TOLL forest. The price is one (1) snack.'",
      choices: [
        { label: "🍞 Hand over your toast", to: "toastGone" },
        { label: "😇 Tell the squirrel you have no snacks", to: "squirrelLie" },
        { label: "👀 Challenge the squirrel to a staring contest", to: "staring" },
      ],
    },
    toastGone: {
      text: "The squirrel takes your toast, nods with deep respect, and presses a hidden acorn-button on the stump.\n\nA SECRET SLIDE appears! 'VIP route,' it winks. You zoom down, wind in your hair, and land right in front of school — with 2 whole minutes to spare.",
      ending: "🏆 THE GENEROUS GENIUS",
      verdict: "On time AND you made a squirrel friend. 10/10 toast extremely well spent.",
    },
    squirrelLie: {
      text: "The squirrel slowly lowers its tiny sunglasses. 'Lies,' it whispers. 'I can smell the toast.'\n\nIt snaps its little fingers. FORTY squirrels appear, each holding a tiny acorn slingshot. This escalated quickly.",
      choices: [
        { label: "🏃 Run for your life!", to: "woodsRun" },
        { label: "🍞 Slowly hand over the toast after all", to: "toastGone" },
      ],
    },
    staring: {
      text: "You and the squirrel lock eyes. A leaf falls. A bird stops singing. Three entire minutes crawl past...\n\nYou blink. The squirrel throws its little arms up in victory! It's so overjoyed that it flags down a passing deer and gives you a piggyback ride to school.",
      ending: "🦌 THE DEER EXPRESS",
      verdict: "A little late, but you arrived on an actual DEER. Honestly? Worth it. 8/10.",
    },
    woodsRun: {
      text: "You sprint through the trees, acorns bouncing off your backpack — pock! pock! pock!\n\nYou burst out the far side straight into the school playground, covered head to toe in leaves. But you MADE IT.",
      ending: "🍃 THE LEAF GOBLIN",
      verdict: "On time, but you look like a walking bush. Your teacher is very confused. 7/10.",
    },

    sidewalk: {
      text: "You speed-walk down the sidewalk like a person with somewhere to be.\n\nUp ahead there's a GIANT puddle — even though it hasn't rained in weeks. It's glowing faintly. It is, unmistakably, humming a little tune.",
      choices: [
        { label: "🦘 Jump majestically over it", to: "jumpPuddle" },
        { label: "🌀 Step INTO the glowing puddle", to: "portal" },
        { label: "🚷 Sensibly walk all the way around it", to: "aroundPuddle" },
      ],
    },
    jumpPuddle: {
      text: "You leap like a majestic frog. Mid-jump, a pigeon makes direct eye contact with you and says, calmly, 'Nice form.'\n\nYou're so startled you land perfectly and keep running. A pigeon just complimented your jumping. Today is going to be weird.",
      choices: [
        { label: "🏫 Keep running to school", to: "almostSchool" },
        { label: "🐦 Stop and ask the pigeon some questions", to: "pigeon" },
      ],
    },
    portal: {
      text: "WHOOSH! The puddle is a PORTAL! You tumble through swirling colors and pop out into... the school cafeteria?\n\nYou're early! And slightly damp! A lunch lady stares at you. 'We don't open till noon,' she says flatly. You wait six hours. But hey — front of the taco line.",
      ending: "🌀 THE PUDDLE TRAVELER",
      verdict: "Technically on time. Mostly soggy. Definitely first for tacos. 9/10.",
    },
    aroundPuddle: {
      text: "Being a sensible and responsible person, you walk all the way around. It takes approximately forever.\n\nAs you pass, the puddle whispers 'cowaaaard.' Rude. You arrive at school exactly as the bell rings.",
      ending: "⏰ THE SENSIBLE ONE",
      verdict: "Dry, on time, and mildly insulted by a puddle. A solid, slightly boring victory. 6/10.",
    },
    pigeon: {
      text: "The pigeon introduces himself as Gary. Gary knows EVERYTHING about this neighborhood. Gary offers to fly you to school.\n\nThere is just one small problem: Gary is a completely normal-sized pigeon.",
      choices: [
        { label: "🐦 Accept Gary's generous offer anyway", to: "garyFly" },
        { label: "🏃 Politely decline and keep running", to: "almostSchool" },
      ],
    },
    garyFly: {
      text: "Gary flaps with all his might. You do not lift off the ground even one single inch. Gary is deeply embarrassed.\n\nTo make it up to you, Gary leads you through a shortcut only pigeons know — through the bakery's back door (FREE SAMPLE!) and out right in front of school.",
      ending: "🥐 THE PIGEON'S APPRENTICE",
      verdict: "On time, snack acquired, and a new bird best friend. 10/10. Gary is proud of you.",
    },

    almostSchool: {
      text: "You can SEE the school now! So close! But standing guard on the front steps is... your teacher's cat, Mr. Whiskerton, wearing a tiny graduation cap.\n\nHe blocks the door. 'Password?' he meows.",
      choices: [
        { label: "🐱 Confidently say 'meow'", to: "catMeow" },
        { label: "🙏 Say 'please'", to: "catPlease" },
        { label: "🖐️ Try to pet him", to: "catPet" },
      ],
    },
    catMeow: {
      text: "Mr. Whiskerton's eyes go WIDE. 'You... you speak Cat?'\n\nHe bows deeply and swings the door open with one little paw. The whole class watches you stroll in like royalty. You have absolutely no idea what just happened, but you're EARLY.",
      ending: "👑 THE CAT WHISPERER",
      verdict: "Early AND respected by cats — the highest honor a human can achieve. 10/10.",
    },
    catPlease: {
      text: "'MANNERS! Finally!' purrs Mr. Whiskerton.\n\nHe lets you in and even carries your backpack the rest of the way with his tail. You're on time and your backpack got a free ride. Lovely.",
      ending: "🎩 THE POLITE LEGEND",
      verdict: "On time and impossibly classy. Your grandmother would be proud. 9/10.",
    },
    catPet: {
      text: "You reach down to pet him. Big mistake. HUGE.\n\nMr. Whiskerton is NOT a petting cat. He boops your nose, swats your backpack into a bush, and struts away without looking back. By the time you dig your backpack out, the bell has rung.",
      ending: "🐾 THE BOOPED",
      verdict: "Late, nose booped, dignity slightly reduced. But honestly? That was a very cool cat. 5/10.",
    },
  };

  const scene = document.getElementById("scene");
  const stepEl = document.getElementById("stepcount");
  let steps = 0;

  function render(key) {
    const node = story[key];
    if (!node) return;
    scene.innerHTML = "";
    scene.classList.toggle("ending", !!node.ending);

    if (node.ending) {
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.textContent = "THE END";
      scene.appendChild(badge);

      const title = document.createElement("p");
      title.id = "text";
      title.textContent = node.ending + "\n\n" + node.verdict;
      scene.appendChild(title);

      const again = document.createElement("button");
      again.className = "again";
      again.textContent = "🔁 Walk to school again";
      again.onclick = () => { steps = 0; render("start"); };
      scene.appendChild(again);

      const s = document.createElement("div");
      s.className = "steps";
      s.textContent = "You got there in " + steps + " choice" + (steps === 1 ? "" : "s") + ".";
      scene.appendChild(s);
      stepEl.textContent = "";
      // restart animation
      scene.style.animation = "none"; void scene.offsetWidth; scene.style.animation = "";
      return;
    }

    const p = document.createElement("p");
    p.id = "text";
    p.textContent = node.text;
    scene.appendChild(p);

    const choices = document.createElement("div");
    choices.className = "choices";
    node.choices.forEach((c) => {
      const b = document.createElement("button");
      b.className = "choice";
      b.textContent = c.label;
      b.onclick = () => { steps++; render(c.to); };
      choices.appendChild(b);
    });
    scene.appendChild(choices);

    stepEl.textContent = steps === 0 ? "" : "Choice " + (steps + 1);
    scene.style.animation = "none"; void scene.offsetWidth; scene.style.animation = "";
  }

  render("start");
})();
</script>
</body>
</html>
