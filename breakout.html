<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#05080f">
<title>Breakout · Tron</title>
<style>
  :root {
    --bg: #05080f;
    --cyan: #36e0ff;
    --text: #cdeefb;
    --muted: #4a7c8c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Tahoma, -apple-system, BlinkMacSystemFont, sans-serif;
    overscroll-behavior: none; touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  #app { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
  #scorebar {
    width: 100%; max-width: 380px; display: flex; justify-content: space-between; align-items: baseline;
    font-variant-numeric: tabular-nums; letter-spacing: 2px; text-transform: uppercase;
    text-shadow: 0 0 8px var(--cyan);
  }
  #scorebar .label { color: var(--muted); font-size: 10px; letter-spacing: 2px; }
  #scorebar .val { font-size: 19px; font-weight: 700; color: var(--cyan); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat.mid { text-align: center; } .stat.right { text-align: right; }
  .topbar { width: 100%; max-width: 380px; }
  .topbar a { color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: 1px; }
  .topbar a:hover { color: var(--cyan); }
  #stage { position: relative; width: 100%; max-width: 380px; aspect-ratio: 320 / 440; }
  canvas {
    display: block; width: 100%; height: 100%;
    background: var(--bg);
    border: 1px solid #103a47;
    border-radius: 8px;
    box-shadow: 0 0 24px rgba(54,224,255,0.18), inset 0 0 30px rgba(54,224,255,0.05);
    touch-action: none;
  }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; text-align: center; padding: 20px; cursor: pointer;
    background: rgba(5,8,15,0.78); backdrop-filter: blur(2px); border-radius: 8px;
    transition: opacity 0.15s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 {
    margin: 0; font-size: clamp(30px, 11vw, 46px); letter-spacing: 6px; color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan), 0 0 28px rgba(54,224,255,0.6);
  }
  #overlay p { margin: 0; color: var(--text); font-size: 15px; line-height: 1.6; letter-spacing: 1px; }
  #overlay .big { font-size: 22px; color: var(--cyan); font-weight: 700; text-shadow: 0 0 10px var(--cyan); }
  #overlay .legend { font-size: 12px; color: var(--muted); line-height: 1.9; letter-spacing: 0.5px; }
  #overlay .legend b { color: var(--text); }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><a href="index.html">← ALL GAMES</a></div>
  <div id="scorebar">
    <div class="stat"><span class="label">Score</span><span class="val" id="score">0</span></div>
    <div class="stat mid"><span class="label">Level</span><span class="val" id="level">1</span></div>
    <div class="stat right"><span class="label">Lives</span><span class="val" id="lives">3</span></div>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1>BREAKOUT</h1>
      <p id="msg" class="pulse">Tap to launch<br><span style="font-size:13px;color:#4a7c8c">Drag or arrow keys to move</span></p>
      <p class="legend">Catch the falling capsules:<br>
        <b style="color:#36e0ff">W</b> wider paddle &nbsp; <b style="color:#ff4fd8">M</b> multi-ball<br>
        <b style="color:#18e0c0">S</b> slow-mo &nbsp; <b style="color:#ffae34">+</b> extra life</p>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // Logical coordinate space (scaled to fit the screen)
  const W = 320, H = 440;
  const BASE_PADDLE_W = 60, WIDE_PADDLE_W = 100, PADDLE_H = 10, PADDLE_Y = H - 26;
  const BALL_R = 5;
  const COLS = 8, ROWS = 5, GAP = 4, SIDE = 8, TOP = 50, BRICK_H = 14;
  const BRICK_W = (W - 2 * SIDE - (COLS - 1) * GAP) / COLS;
  const ROW_COLORS = ["#36e0ff", "#18e0c0", "#ffae34", "#ff4fd8", "#b388ff"];
  const MAX_BOUNCE = 1.05;        // radians (~60°) off paddle center
  const DROP_CHANCE = 0.16;       // chance a smashed brick drops a power-up
  const CAP_W = 22, CAP_H = 12, CAP_SPEED = 1.8;
  const SLOW_MUL = 0.62, EFFECT_MS = 8000, MAX_BALLS = 6;

  const PU = {
    wide:  { color: "#36e0ff", letter: "W", weight: 30, name: "Wide paddle" },
    multi: { color: "#ff4fd8", letter: "M", weight: 30, name: "Multi-ball" },
    slow:  { color: "#18e0c0", letter: "S", weight: 24, name: "Slow-mo" },
    life:  { color: "#ffae34", letter: "+", weight: 16, name: "Extra life" },
  };
  const PU_KEYS = Object.keys(PU);
  const PU_TOTAL = PU_KEYS.reduce((s, k) => s + PU[k].weight, 0);

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const msg = document.getElementById("msg");
  const scoreEl = document.getElementById("score");
  const levelEl = document.getElementById("level");
  const livesEl = document.getElementById("lives");

  let paddleX, paddleW, balls, bricks, caps, score, best, lives, level, speed;
  let wideUntil = 0, slowUntil = 0, slowActive = false, nowMs = 0;
  let state = "ready";   // ready | playing | dead
  let raf = null;
  const keys = { left: false, right: false };

  best = parseInt(localStorage.getItem("breakout_best") || "0", 10) || 0;

  function resize() {
    const size = document.getElementById("stage").clientWidth;
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width = size * dpr;
    canvas.height = size * (H / W) * dpr;
    ctx.setTransform((size / W) * dpr, 0, 0, (size / W) * dpr, 0, 0);
    draw();
  }
  window.addEventListener("resize", resize);

  function buildBricks() {
    bricks = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        bricks.push({
          x: SIDE + c * (BRICK_W + GAP),
          y: TOP + r * (BRICK_H + GAP),
          w: BRICK_W, h: BRICK_H,
          color: ROW_COLORS[r % ROW_COLORS.length],
          points: (ROWS - r) * 10,
          alive: true,
        });
      }
    }
  }

  function newGame() {
    score = 0; lives = 3; level = 1; speed = 3.6;
    paddleX = W / 2;
    buildBricks();
    resetBalls();
    updateHUD();
  }

  // Reset to a single ball on the paddle and clear all in-flight stuff/effects
  function resetBalls() {
    balls = [{ x: paddleX, y: PADDLE_Y - BALL_R - 1, vx: 0, vy: 0, trail: [] }];
    caps = [];
    wideUntil = 0; slowUntil = 0; slowActive = false;
    paddleW = BASE_PADDLE_W;
    state = "ready";
  }

  function launch() {
    if (state !== "ready" || !balls.length) return;
    const angle = (Math.random() * 0.5 - 0.25);
    const sp = speed * (slowActive ? SLOW_MUL : 1);
    balls[0].vx = sp * Math.sin(angle);
    balls[0].vy = -sp * Math.cos(angle);
    state = "playing";
    overlay.classList.add("hidden");
  }

  function updateHUD() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    livesEl.textContent = lives;
  }

  function loseLife() {
    lives--; updateHUD();
    if (lives <= 0) { gameOver(); return; }
    resetBalls();
    showOverlay('<span class="big">Ball lost</span><br>' + lives + ' left<br><span style="font-size:13px;color:#4a7c8c">Tap to launch</span>');
  }

  function gameOver() {
    state = "dead";
    if (score > best) { best = score; localStorage.setItem("breakout_best", String(best)); }
    showOverlay('<span class="big">GAME OVER</span><br>Score ' + score + ' · Best ' + best + '<br><span style="font-size:13px;color:#4a7c8c">Tap to play again</span>');
  }

  function levelUp() {
    level++;
    speed = Math.min(6.5, speed + 0.4);
    buildBricks();
    resetBalls();
    updateHUD();
    showOverlay('<span class="big">LEVEL ' + level + '</span><br><span style="font-size:13px;color:#4a7c8c">Tap to launch</span>');
  }

  function showOverlay(html) {
    msg.innerHTML = html;
    msg.classList.add("pulse");
    overlay.classList.remove("hidden");
  }

  // --- power-ups ---
  function pickPU() {
    let r = Math.random() * PU_TOTAL;
    for (const k of PU_KEYS) { if ((r -= PU[k].weight) < 0) return k; }
    return PU_KEYS[0];
  }

  function maybeDrop(b) {
    if (Math.random() < DROP_CHANCE) {
      caps.push({ x: b.x + b.w / 2 - CAP_W / 2, y: b.y, type: pickPU() });
    }
  }

  function applyPU(type) {
    if (type === "wide") wideUntil = nowMs + EFFECT_MS;
    else if (type === "slow") slowUntil = nowMs + EFFECT_MS;
    else if (type === "life") { lives++; updateHUD(); }
    else if (type === "multi") {
      const extra = [];
      for (const b of balls) {
        if (b.vx === 0 && b.vy === 0) continue; // skip a ball resting on the paddle
        for (const a of [0.4, -0.4]) {
          if (balls.length + extra.length >= MAX_BALLS) break;
          const c = Math.cos(a), s = Math.sin(a);
          extra.push({ x: b.x, y: b.y, vx: b.vx * c - b.vy * s, vy: b.vx * s + b.vy * c, trail: [] });
        }
      }
      balls.push(...extra);
    }
  }

  function updateCaps() {
    for (const cap of caps) {
      cap.y += CAP_SPEED;
      const caught = cap.y + CAP_H >= PADDLE_Y && cap.y <= PADDLE_Y + PADDLE_H &&
        cap.x + CAP_W >= paddleX - paddleW / 2 && cap.x <= paddleX + paddleW / 2;
      if (caught) { applyPU(cap.type); cap.dead = true; }
      else if (cap.y > H) cap.dead = true;
    }
    caps = caps.filter(c => !c.dead);
  }

  // --- physics ---
  function movePaddle() {
    if (keys.left) paddleX -= 6;
    if (keys.right) paddleX += 6;
    paddleX = Math.max(paddleW / 2, Math.min(W - paddleW / 2, paddleX));
    if (state === "ready" && balls.length) { balls[0].x = paddleX; balls[0].y = PADDLE_Y - BALL_R - 1; }
  }

  // Move one ball with sub-steps; returns false if it fell off the bottom.
  function stepBall(ball) {
    const dist = Math.hypot(ball.vx, ball.vy);
    const steps = Math.max(1, Math.ceil(dist / (BALL_R * 0.8)));
    for (let s = 0; s < steps; s++) {
      ball.x += ball.vx / steps;
      ball.y += ball.vy / steps;

      if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
      else if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
      if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

      // paddle
      if (ball.vy > 0 && ball.y + BALL_R >= PADDLE_Y && ball.y + BALL_R <= PADDLE_Y + PADDLE_H + 4 &&
          ball.x >= paddleX - paddleW / 2 - BALL_R && ball.x <= paddleX + paddleW / 2 + BALL_R) {
        const hit = Math.max(-1, Math.min(1, (ball.x - paddleX) / (paddleW / 2)));
        const angle = hit * MAX_BOUNCE;
        const sp = speed * (slowActive ? SLOW_MUL : 1);
        ball.vx = sp * Math.sin(angle);
        ball.vy = -Math.abs(sp * Math.cos(angle));
        ball.y = PADDLE_Y - BALL_R - 0.5;
      }

      // bricks (one hit per sub-step)
      for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x + BALL_R < b.x || ball.x - BALL_R > b.x + b.w ||
            ball.y + BALL_R < b.y || ball.y - BALL_R > b.y + b.h) continue;
        const oL = (ball.x + BALL_R) - b.x;
        const oR = (b.x + b.w) - (ball.x - BALL_R);
        const oT = (ball.y + BALL_R) - b.y;
        const oB = (b.y + b.h) - (ball.y - BALL_R);
        const m = Math.min(oL, oR, oT, oB);
        if (m === oL) { ball.vx = -Math.abs(ball.vx); ball.x = b.x - BALL_R; }
        else if (m === oR) { ball.vx = Math.abs(ball.vx); ball.x = b.x + b.w + BALL_R; }
        else if (m === oT) { ball.vy = -Math.abs(ball.vy); ball.y = b.y - BALL_R; }
        else { ball.vy = Math.abs(ball.vy); ball.y = b.y + b.h + BALL_R; }
        b.alive = false;
        score += b.points;
        maybeDrop(b);
        updateHUD();
        break;
      }

      if (ball.y - BALL_R > H) return false;
    }
    return true;
  }

  function update() {
    // timed paddle width
    paddleW = nowMs < wideUntil ? WIDE_PADDLE_W : BASE_PADDLE_W;

    // slow-mo transition: rescale all live ball velocities once on enter/exit
    const wantSlow = nowMs < slowUntil;
    if (wantSlow !== slowActive) {
      const f = wantSlow ? SLOW_MUL : 1 / SLOW_MUL;
      for (const b of balls) { b.vx *= f; b.vy *= f; }
      slowActive = wantSlow;
    }

    movePaddle();

    if (state !== "playing") return;

    for (const b of balls) {
      b.trail.push({ x: b.x, y: b.y });
      if (b.trail.length > 10) b.trail.shift();
    }
    balls = balls.filter(b => stepBall(b));

    if (!balls.length) { loseLife(); return; }
    updateCaps();
    if (bricks.every(b => !b.alive)) levelUp();
  }

  // --- rendering ---
  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = "rgba(54,224,255,0.06)";
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y <= H; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    if (!bricks) return;

    for (const b of bricks) {
      if (!b.alive) continue;
      ctx.shadowColor = b.color; ctx.shadowBlur = 8;
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = b.color; ctx.lineWidth = 1.5;
      ctx.strokeRect(b.x + 0.75, b.y + 0.75, b.w - 1.5, b.h - 1.5);
    }
    ctx.shadowBlur = 0;

    // falling power-up capsules
    for (const cap of caps) {
      const p = PU[cap.type];
      ctx.shadowColor = p.color; ctx.shadowBlur = 10;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      roundRect(cap.x, cap.y, CAP_W, CAP_H, 4); ctx.fill();
      ctx.strokeStyle = p.color; ctx.lineWidth = 1.5;
      roundRect(cap.x + 0.75, cap.y + 0.75, CAP_W - 1.5, CAP_H - 1.5, 3.5); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = p.color;
      ctx.font = "bold 9px 'Segoe UI', sans-serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(p.letter, cap.x + CAP_W / 2, cap.y + CAP_H / 2 + 0.5);
    }
    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";

    // balls + trails
    const ballColor = slowActive ? "#9af7d8" : "#eafcff";
    for (const ball of balls) {
      for (let i = 0; i < ball.trail.length; i++) {
        const t = ball.trail[i];
        ctx.globalAlpha = (i / ball.trail.length) * 0.5;
        ctx.fillStyle = "#36e0ff";
        ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R * (i / ball.trail.length), 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowColor = "#aef3ff"; ctx.shadowBlur = 14;
      ctx.fillStyle = ballColor;
      ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // paddle
    ctx.shadowColor = "#36e0ff"; ctx.shadowBlur = 16;
    ctx.fillStyle = "#36e0ff";
    const px = paddleX - paddleW / 2;
    roundRect(px, PADDLE_Y, paddleW, PADDLE_H, 4); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    roundRect(px + 6, PADDLE_Y + 3, paddleW - 12, 2, 1); ctx.fill();

    // active-effect chips (top strip)
    let ex = 8;
    ctx.font = "bold 9px 'Segoe UI', sans-serif"; ctx.textBaseline = "middle";
    if (nowMs < wideUntil) ex = effectChip("WIDE", PU.wide.color, ex);
    if (nowMs < slowUntil) ex = effectChip("SLOW", PU.slow.color, ex);
    ctx.textBaseline = "alphabetic";
  }

  function effectChip(label, color, x) {
    const w = ctx.measureText(label).width + 12;
    ctx.shadowColor = color; ctx.shadowBlur = 6;
    ctx.strokeStyle = color; ctx.lineWidth = 1;
    roundRect(x, 6, w, 14, 4); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = color;
    ctx.fillText(label, x + 6, 13.5);
    return x + w + 6;
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function loop(now) {
    raf = requestAnimationFrame(loop);
    nowMs = now;
    update();
    draw();
  }

  // --- input ---
  function pointerToPaddle(clientX) {
    const rect = canvas.getBoundingClientRect();
    const lx = ((clientX - rect.left) / rect.width) * W;
    paddleX = Math.max(paddleW / 2, Math.min(W - paddleW / 2, lx));
    if (state === "ready" && balls.length) balls[0].x = paddleX;
  }

  function tap() {
    if (state === "dead") { newGame(); overlay.classList.add("hidden"); }
    else if (state === "paused") { state = "playing"; overlay.classList.add("hidden"); }
    else if (state === "ready") { launch(); }
  }

  canvas.addEventListener("pointerdown", (e) => { pointerToPaddle(e.clientX); }, { passive: true });
  canvas.addEventListener("pointermove", (e) => { pointerToPaddle(e.clientX); }, { passive: true });
  overlay.addEventListener("pointerdown", (e) => { e.preventDefault(); tap(); });
  canvas.addEventListener("click", () => { if (state === "ready") launch(); });

  window.addEventListener("keydown", (e) => {
    if (["ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
    if (e.code === "Space" || e.code === "Enter") tap();
  }, { passive: false });
  window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
  });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && state === "playing") {
      state = "paused";   // freeze balls in place; resume with a tap
      showOverlay('<span class="big">Paused</span><br><span style="font-size:13px;color:#4a7c8c">Tap to resume</span>');
    }
  });

  paddleW = BASE_PADDLE_W;
  newGame();
  resize();
  raf = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
