<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#05080f">
<title>Breakout · Tron</title>
<style>
  :root {
    --bg: #05080f;
    --cyan: #36e0ff;
    --cyan-dim: #0e2a35;
    --text: #cdeefb;
    --muted: #4a7c8c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", Tahoma, -apple-system, BlinkMacSystemFont, sans-serif;
    overscroll-behavior: none; touch-action: none;
    user-select: none; -webkit-user-select: none;
  }
  #app { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 10px; }
  #scorebar {
    width: 100%; max-width: 380px; display: flex; justify-content: space-between; align-items: baseline;
    font-variant-numeric: tabular-nums; letter-spacing: 2px; text-transform: uppercase;
    text-shadow: 0 0 8px var(--cyan);
  }
  #scorebar .label { color: var(--muted); font-size: 10px; letter-spacing: 2px; }
  #scorebar .val { font-size: 19px; font-weight: 700; color: var(--cyan); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat.mid { text-align: center; } .stat.right { text-align: right; }
  .topbar { width: 100%; max-width: 380px; }
  .topbar a { color: var(--muted); text-decoration: none; font-size: 13px; letter-spacing: 1px; }
  .topbar a:hover { color: var(--cyan); }
  #stage { position: relative; width: 100%; max-width: 380px; aspect-ratio: 320 / 440; }
  canvas {
    display: block; width: 100%; height: 100%;
    background: var(--bg);
    border: 1px solid #103a47;
    border-radius: 8px;
    box-shadow: 0 0 24px rgba(54,224,255,0.18), inset 0 0 30px rgba(54,224,255,0.05);
    touch-action: none;
  }
  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; text-align: center; padding: 20px; cursor: pointer;
    background: rgba(5,8,15,0.78); backdrop-filter: blur(2px); border-radius: 8px;
    transition: opacity 0.15s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 {
    margin: 0; font-size: clamp(30px, 11vw, 46px); letter-spacing: 6px; color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan), 0 0 28px rgba(54,224,255,0.6);
  }
  #overlay p { margin: 0; color: var(--text); font-size: 15px; line-height: 1.6; letter-spacing: 1px; }
  #overlay .big { font-size: 22px; color: var(--cyan); font-weight: 700; text-shadow: 0 0 10px var(--cyan); }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><a href="index.html">← ALL GAMES</a></div>
  <div id="scorebar">
    <div class="stat"><span class="label">Score</span><span class="val" id="score">0</span></div>
    <div class="stat mid"><span class="label">Level</span><span class="val" id="level">1</span></div>
    <div class="stat right"><span class="label">Lives</span><span class="val" id="lives">3</span></div>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h1>BREAKOUT</h1>
      <p id="msg" class="pulse">Tap to launch<br><span style="font-size:13px;color:#4a7c8c">Drag or arrow keys to move</span></p>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // Logical coordinate space (scaled to fit the screen)
  const W = 320, H = 440;
  const PADDLE_W = 60, PADDLE_H = 10, PADDLE_Y = H - 26;
  const BALL_R = 5;
  const COLS = 8, ROWS = 5, GAP = 4, SIDE = 8, TOP = 46, BRICK_H = 14;
  const BRICK_W = (W - 2 * SIDE - (COLS - 1) * GAP) / COLS;
  const ROW_COLORS = ["#36e0ff", "#18e0c0", "#ffae34", "#ff4fd8", "#b388ff"];
  const MAX_BOUNCE = 1.05; // radians (~60°) off paddle center

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const msg = document.getElementById("msg");
  const scoreEl = document.getElementById("score");
  const levelEl = document.getElementById("level");
  const livesEl = document.getElementById("lives");

  let paddleX, ball, bricks, score, best, lives, level, speed, trail;
  let state = "ready";   // ready | playing | dead
  let last = 0, raf = null;
  const keys = { left: false, right: false };

  best = parseInt(localStorage.getItem("breakout_best") || "0", 10) || 0;

  function resize() {
    const size = document.getElementById("stage").clientWidth;
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width = size * dpr;
    canvas.height = size * (H / W) * dpr;
    // scale logical W×H to pixel canvas
    ctx.setTransform((size / W) * dpr, 0, 0, (size / W) * dpr, 0, 0);
    draw();
  }
  window.addEventListener("resize", resize);

  function buildBricks() {
    bricks = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        bricks.push({
          x: SIDE + c * (BRICK_W + GAP),
          y: TOP + r * (BRICK_H + GAP),
          w: BRICK_W, h: BRICK_H,
          color: ROW_COLORS[r % ROW_COLORS.length],
          points: (ROWS - r) * 10,
          alive: true,
        });
      }
    }
  }

  function newGame() {
    score = 0; lives = 3; level = 1;
    speed = 3.6;
    paddleX = W / 2;
    buildBricks();
    resetBall();
    updateHUD();
  }

  function resetBall() {
    ball = { x: paddleX, y: PADDLE_Y - BALL_R - 1, vx: 0, vy: 0 };
    trail = [];
    state = "ready";
  }

  function launch() {
    const angle = (Math.random() * 0.5 - 0.25); // small spread around straight up
    ball.vx = speed * Math.sin(angle);
    ball.vy = -speed * Math.cos(angle);
    state = "playing";
    overlay.classList.add("hidden");
  }

  function updateHUD() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    livesEl.textContent = lives;
  }

  function loseLife() {
    lives--;
    updateHUD();
    if (lives <= 0) { gameOver(); return; }
    resetBall();
    showOverlay('<span class="big">Ball lost</span><br>' + lives + ' left<br><span style="font-size:13px;color:#4a7c8c">Tap to launch</span>');
  }

  function gameOver() {
    state = "dead";
    if (score > best) { best = score; localStorage.setItem("breakout_best", String(best)); }
    showOverlay('<span class="big">GAME OVER</span><br>Score ' + score + ' · Best ' + best + '<br><span style="font-size:13px;color:#4a7c8c">Tap to play again</span>');
  }

  function levelUp() {
    level++;
    speed = Math.min(6.5, speed + 0.4);
    buildBricks();
    resetBall();
    updateHUD();
    showOverlay('<span class="big">LEVEL ' + level + '</span><br><span style="font-size:13px;color:#4a7c8c">Tap to launch</span>');
  }

  function showOverlay(html) {
    msg.innerHTML = html;
    msg.classList.add("pulse");
    overlay.classList.remove("hidden");
  }

  // --- physics ---
  function movePaddle(dt) {
    if (keys.left) paddleX -= 6;
    if (keys.right) paddleX += 6;
    paddleX = Math.max(PADDLE_W / 2, Math.min(W - PADDLE_W / 2, paddleX));
    if (state === "ready") { ball.x = paddleX; ball.y = PADDLE_Y - BALL_R - 1; }
  }

  function stepBall() {
    // substep to avoid tunnelling through bricks at speed
    const dist = Math.hypot(ball.vx, ball.vy);
    const steps = Math.max(1, Math.ceil(dist / (BALL_R * 0.8)));
    for (let s = 0; s < steps; s++) {
      ball.x += ball.vx / steps;
      ball.y += ball.vy / steps;

      // walls
      if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
      else if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
      if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

      // paddle
      if (ball.vy > 0 && ball.y + BALL_R >= PADDLE_Y && ball.y + BALL_R <= PADDLE_Y + PADDLE_H + 4 &&
          ball.x >= paddleX - PADDLE_W / 2 - BALL_R && ball.x <= paddleX + PADDLE_W / 2 + BALL_R) {
        const hit = Math.max(-1, Math.min(1, (ball.x - paddleX) / (PADDLE_W / 2)));
        const angle = hit * MAX_BOUNCE;
        ball.vx = speed * Math.sin(angle);
        ball.vy = -Math.abs(speed * Math.cos(angle));
        ball.y = PADDLE_Y - BALL_R - 0.5;
      }

      // bricks (one hit per substep)
      for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x + BALL_R < b.x || ball.x - BALL_R > b.x + b.w ||
            ball.y + BALL_R < b.y || ball.y - BALL_R > b.y + b.h) continue;
        // overlap on each side; smallest = collision normal
        const oL = (ball.x + BALL_R) - b.x;
        const oR = (b.x + b.w) - (ball.x - BALL_R);
        const oT = (ball.y + BALL_R) - b.y;
        const oB = (b.y + b.h) - (ball.y - BALL_R);
        const m = Math.min(oL, oR, oT, oB);
        if (m === oL) { ball.vx = -Math.abs(ball.vx); ball.x = b.x - BALL_R; }
        else if (m === oR) { ball.vx = Math.abs(ball.vx); ball.x = b.x + b.w + BALL_R; }
        else if (m === oT) { ball.vy = -Math.abs(ball.vy); ball.y = b.y - BALL_R; }
        else { ball.vy = Math.abs(ball.vy); ball.y = b.y + b.h + BALL_R; }
        b.alive = false;
        score += b.points;
        updateHUD();
        break;
      }

      // bottom = lose life
      if (ball.y - BALL_R > H) { loseLife(); return; }
    }

    if (bricks.every(b => !b.alive)) levelUp();
  }

  function update() {
    movePaddle();
    if (state === "playing") {
      trail.push({ x: ball.x, y: ball.y });
      if (trail.length > 10) trail.shift();
      stepBall();
    }
  }

  // --- rendering ---
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // grid
    ctx.strokeStyle = "rgba(54,224,255,0.06)";
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 20) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = 0; y <= H; y += 20) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    if (!bricks) return;

    // bricks — dark fill, neon outline + glow (Tron look)
    for (const b of bricks) {
      if (!b.alive) continue;
      ctx.shadowColor = b.color; ctx.shadowBlur = 8;
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = b.color; ctx.lineWidth = 1.5;
      ctx.strokeRect(b.x + 0.75, b.y + 0.75, b.w - 1.5, b.h - 1.5);
    }
    ctx.shadowBlur = 0;

    // ball trail
    if (trail) {
      for (let i = 0; i < trail.length; i++) {
        const t = trail[i];
        ctx.globalAlpha = (i / trail.length) * 0.5;
        ctx.fillStyle = "#36e0ff";
        ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R * (i / trail.length), 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ball
    if (ball) {
      ctx.shadowColor = "#aef3ff"; ctx.shadowBlur = 14;
      ctx.fillStyle = "#eafcff";
      ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // paddle — glowing cyan bar
    ctx.shadowColor = "#36e0ff"; ctx.shadowBlur = 16;
    ctx.fillStyle = "#36e0ff";
    const px = paddleX - PADDLE_W / 2;
    roundRect(px, PADDLE_Y, PADDLE_W, PADDLE_H, 4); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    roundRect(px + 6, PADDLE_Y + 3, PADDLE_W - 12, 2, 1); ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function loop(now) {
    raf = requestAnimationFrame(loop);
    if (!last) last = now;
    last = now;
    update();
    draw();
  }

  // --- input ---
  function pointerToPaddle(clientX) {
    const rect = canvas.getBoundingClientRect();
    const lx = ((clientX - rect.left) / rect.width) * W;
    paddleX = Math.max(PADDLE_W / 2, Math.min(W - PADDLE_W / 2, lx));
    if (state === "ready") ball.x = paddleX;
  }

  function tap() {
    if (state === "dead") { newGame(); overlay.classList.add("hidden"); state = "ready"; }
    else if (state === "ready") { launch(); }
  }

  canvas.addEventListener("pointerdown", (e) => { pointerToPaddle(e.clientX); }, { passive: true });
  canvas.addEventListener("pointermove", (e) => { pointerToPaddle(e.clientX); }, { passive: true });
  overlay.addEventListener("pointerdown", (e) => { e.preventDefault(); tap(); });
  canvas.addEventListener("click", () => { if (state === "ready") launch(); });

  window.addEventListener("keydown", (e) => {
    if (["ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
    if (e.code === "Space" || e.code === "Enter") tap();
  }, { passive: false });
  window.addEventListener("keyup", (e) => {
    if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
    if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
  });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden && state === "playing") {
      state = "ready";
      showOverlay('<span class="big">Paused</span><br><span style="font-size:13px;color:#4a7c8c">Tap to launch</span>');
    }
  });

  newGame();
  resize();
  raf = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
